{t:"The concept of the garden city, articulated by Ebenezer Howard, envisioned a synthesis of urban and rural amenities.",z:"由埃比尼泽·霍华德阐述的田园城市概念构想了城市与乡村设施的融合。",d:3,level:5},
{t:"Bus rapid transit systems offer a cost-effective alternative to rail-based mass transit in rapidly growing cities.",z:"快速公交系统为快速增长的城市提供了替代轨道交通的经济高效的方案。",d:3,level:5},
{t:"The adaptive reuse of industrial warehouses and factories has become a hallmark of contemporary urban regeneration.",z:"工业仓库和工厂的适应性再利用已成为当代城市更新的标志。",d:3,level:5},
{t:"Night-time economy planning addresses the distinctive challenges posed by after-hours commercial activity.",z:"夜间经济规划解决非营业时间商业活动带来的独特挑战。",d:3,level:5},
{t:"The concept of transit deserts identifies urban areas underserved by public transportation networks.",z:"交通荒漠的概念识别了公共交通网络覆盖不足的城市区域。",d:3,level:5},
{t:"Community land trusts provide a mechanism for preserving affordable housing in neighborhoods experiencing rising property values.",z:"社区土地信托为在房产价值上升的社区中保留经济适用房提供了一种机制。",d:3,level:5},
{t:"The implementation of superblocks in Barcelona has demonstrated the potential for reclaiming streets for public use.",z:"巴塞罗那超级街区的实施展示了将街道归还公共使用的潜力。",d:3,level:5},
{t:"Vertical zoning, which permits greater building height near transit nodes, can intensify land use efficiently.",z:"垂直分区允许在交通节点附近增加建筑高度，能够高效地集约土地使用。",d:3,level:5},
{t:"The phenomenon of food deserts in urban areas reflects systemic inequities in the distribution of fresh produce.",z:"城市中食品荒漠的现象反映了新鲜农产品分配中系统性的不平等。",d:3,level:5},
{t:"CPTED, or Crime Prevention Through Environmental Design, integrates security considerations into urban planning.",z:"CPTED，即通过环境设计预防犯罪，将安全考量融入城市规划。",d:3,level:5},
{t:"The phenomenon of counter-urbanization, driven by quality-of-life considerations, has reshaped settlement patterns.",z:"由生活质量考量驱动的逆城市化现象已重塑了定居模式。",d:3,level:5},
{t:"Mixed-use zoning, which permits residential, commercial, and recreational functions within a single district, promotes vibrancy.",z:"混合用途分区允许在单一区域内兼具居住、商业和休闲功能，促进社区活力。",d:3,level:5},
{t:"The concept of the polycentric city distributes economic activity across multiple urban centers to reduce congestion.",z:"多中心城市的概念将经济活动分布在多个城市中心以减少拥堵。",d:3,level:5},
{t:"The provision of micro-mobility infrastructure, including bike lanes and scooter-sharing docks, is reshaping urban transport.",z:"微出行基础设施的提供——包括自行车道和电动滑板车共享站点——正在重塑城市交通。",d:3,level:5},
{t:"Urban agriculture initiatives can enhance food security and reduce the carbon footprint of food distribution.",z:"城市农业倡议可以增强粮食安全并减少食品分配的碳足迹。",d:3,level:5},
{t:"The concept of the TOD corridor promotes linear development along high-capacity transit routes.",z:"TOD走廊的概念促进了沿高运力交通线路的线性开发。",d:3,level:5},
{t:"Zoning reform, including the elimination of single-family zoning, has gained momentum as a tool for addressing housing shortages.",z:"分区改革——包括取消独栋住宅分区——作为解决住房短缺的工具已获得发展动力。",d:3,level:5},
{t:"The equitable distribution of civic amenities across urban neighborhoods remains a persistent planning challenge.",z:"在城市社区之间公平分配公共设施仍然是一个持续的规划挑战。",d:3,level:5},
{t:"The phenomenon of leapfrog development, where new construction bypasses existing infrastructure, strains public services.",z:"蛙跳式发展现象——新建筑绕过现有基础设施——给公共服务带来压力。",d:3,level:5},
{t:"Pedestrianization of commercial streets has been shown to increase retail sales while improving air quality.",z:"商业街的步行化已被证明能增加零售额，同时改善空气质量。",d:3,level:5},
{t:"The concept of the biophilic city incorporates natural elements into the urban fabric to enhance human well-being.",z:"亲生物城市的概念将自然元素融入城市肌理以增强人类福祉。",d:3,level:5},
{t:"The establishment of urban growth boundaries constrains outward expansion and preserves surrounding agricultural land.",z:"城市增长边界的设立约束了向外扩张并保护了周边的农业用地。",d:3,level:5},
// ============ Lv.5 雅思冲刺 (Digital Society) ============
{t:"The pervasiveness of social media platforms has fundamentally altered the dynamics of political discourse and civic engagement.",z:"社交媒体平台的普遍化从根本上改变了政治话语和公民参与的动态。",d:3,level:5},
{t:"Algorithmic curation of information feeds can create echo chambers that reinforce pre-existing beliefs and biases.",z:"信息流的算法策展可能形成回音室，强化已有的信念和偏见。",d:3,level:5},
{t:"The digital divide, both between and within nations, represents a significant barrier to equitable participation in the knowledge economy.",z:"数字鸿沟——无论国家间还是国家内部——代表着公平参与知识经济的重大障碍。",d:3,level:5},
{t:"Data sovereignty, the principle that data is subject to the laws of the nation in which it is collected, is gaining regulatory traction.",z:"数据主权——即数据受其收集所在国法律约束的原则——正在获得监管支持。",d:3,level:5},
{t:"The proliferation of deepfake technology poses unprecedented challenges to the integrity of digital information.",z:"深度伪造技术的激增对数字信息的完整性提出了前所未有的挑战。",d:3,level:5},
{t:"Platform economies, driven by gig workers and algorithmic management, have redefined the contours of employment.",z:"由零工工人和算法管理驱动的平台经济重新定义了就业的轮廓。",d:3,level:5},
{t:"The right to be forgotten, enshrined in the GDPR, reflects growing concerns about the permanence of online data.",z:"被遗忘权——在GDPR中有规定——反映了对在线数据永久性的日益担忧。",d:3,level:5},
{t:"Digital literacy is increasingly recognized as a fundamental competency in the twenty-first century.",z:"数字素养日益被视为21世纪的一项基本能力。",d:3,level:5},
{t:"The attention economy commodifies human cognitive resources, incentivizing the design of addictive digital interfaces.",z:"注意力经济将人类认知资源商品化，激励了成瘾性数字界面的设计。",d:3,level:5},
{t:"Artificial intelligence deployed in criminal justice systems raises concerns about algorithmic bias and due process.",z:"在刑事司法系统中部署的人工智能引发了对算法偏见和正当程序的担忧。",d:3,level:5},
{t:"The internet of things connects billions of devices, generating vast datasets that reshape consumer analytics and urban management.",z:"物联网连接了数十亿设备，生成了重塑消费者分析和城市管理的海量数据集。",d:3,level:5},
{t:"Cybersecurity threats have escalated in sophistication, necessitating proactive and collaborative defense strategies.",z:"网络安全威胁的复杂性不断升级，需要主动且协作的防御策略。",d:3,level:5},
{t:"The gig economy, while offering flexibility, often leaves workers without the protections afforded by traditional employment.",z:"零工经济虽然提供了灵活性，但往往使工人缺乏传统就业所享有的保障。",d:3,level:5},
{t:"Digital surveillance by both state and corporate actors raises fundamental questions about civil liberties and privacy.",z:"国家和企业行为者的数字监控引发了关于公民自由和隐私的根本问题。",d:3,level:5},
{t:"The democratization of content creation via platforms like YouTube has disrupted traditional media gatekeepers.",z:"通过YouTube等平台实现的内容创作民主化颠覆了传统媒体守门人。",d:3,level:5},
{t:"Blockchain technology, beyond its association with cryptocurrency, has potential applications in supply chain transparency.",z:"区块链技术——超越其与加密货币的关联——在供应链透明度方面具有潜在应用。",d:3,level:5},
{t:"The opacity of algorithmic decision-making systems undermines accountability and public trust.",z:"算法决策系统的不透明性削弱了问责性和公众信任。",d:3,level:5},
{t:"Digital nomadism, enabled by remote work technologies, is redefining the relationship between place and productivity.",z:"由远程工作技术驱动的数字游牧生活方式正在重新定义地点与生产力之间的关系。",d:3,level:5},
{t:"Misinformation campaigns on digital platforms can destabilize democratic institutions and erode social cohesion.",z:"数字平台上的虚假信息运动可能动摇民主制度并削弱社会凝聚力。",d:3,level:5},
{t:"The commodification of personal data has prompted calls for comprehensive digital privacy legislation.",z:"个人数据的商品化促使人们呼吁制定全面的数字隐私立法。",d:3,level:5},
{t:"The concept of digital citizenship encompasses the rights and responsibilities of individuals in online spaces.",z:"数字公民的概念涵盖了个人在网络空间中的权利和责任。",d:3,level:5},
{t:"Telemedicine platforms have demonstrated their capacity to bridge healthcare access gaps in remote communities.",z:"远程医疗平台已展示了其在弥合偏远社区医疗获取差距方面的能力。",d:3,level:5},
{t:"The algorithmic amplification of sensational content has been implicated in the deterioration of public discourse.",z:"算法放大耸人听闻的内容已被认定为公共话语恶化的诱因之一。",d:3,level:5},
{t:"The environmental cost of digital infrastructure, particularly data centers, is a growing concern in sustainability discourse.",z:"数字基础设施——特别是数据中心——的环境成本是可持续发展话语中日益关注的问题。",d:3,level:5},
{t:"Digital identity verification systems must balance security imperatives with accessibility and inclusivity.",z:"数字身份验证系统必须在安全需求与可及性和包容性之间取得平衡。",d:3,level:5},
{t:"The gigification of labor, facilitated by digital platforms, has blurred the boundaries between employment and entrepreneurship.",z:"由数字平台促成的劳动零工化模糊了就业与创业之间的界限。",d:3,level:5},
{t:"The concept of digital twin technology enables real-time simulation and optimization of physical systems.",z:"数字孪生技术的概念实现了对物理系统的实时模拟和优化。",d:3,level:5},
{t:"Content moderation at scale remains one of the most intractable challenges facing global technology companies.",z:"大规模内容审核仍然是全球科技公司面临的最棘手的挑战之一。",d:3,level:5},
{t:"The gamification of education, while engaging, raises questions about extrinsic motivation and learning depth.",z:"教育的游戏化虽然引人入胜，但也引发了关于外在动机和学习深度的问题。",d:3,level:5},
{t:"Quantum computing, though still nascent, threatens to render current cryptographic standards obsolete.",z:"量子计算虽然仍处于初级阶段，但可能使当前的加密标准过时。",d:3,level:5},
{t:"The phenomenon of doomscrolling illustrates how digital interfaces can exploit psychological vulnerabilities.",z:"末日刷屏现象说明了数字界面如何利用心理脆弱性。",d:3,level:5},
{t:"Open-source software movements have demonstrated the viability of collaborative, decentralized development models.",z:"开源软件运动已展示了协作式、去中心化开发模式的可行性。",d:3,level:5},
{t:"The rise of e-sports as a multi-billion-dollar industry challenges traditional conceptions of athletic competition.",z:"作为数十亿美元产业的电子竞技的兴起挑战了传统竞技概念。",d:3,level:5},
{t:"The digital transformation of public services promises efficiency gains but risks exacerbating existing inequalities.",z:"公共服务的数字化转型有望带来效率提升，但有加剧现有不平等的风险。",d:3,level:5},
{t:"Facial recognition technology, while advancing public safety, raises profound concerns about surveillance and anonymity.",z:"面部识别技术虽然推进了公共安全，但引发了关于监控和匿名性的深刻担忧。",d:3,level:5},
{t:"The concept of techlash reflects growing public and regulatory discontent with the unchecked power of technology corporations.",z:"科技反弹的概念反映了公众和监管机构对科技公司不受制约的权力日益增长的不满。",d:3,level:5},
{t:"Digital archiving of cultural heritage faces challenges of format obsolescence and data degradation over time.",z:"文化遗产的数字归档面临格式过时和数据随时间退化的挑战。",d:3,level:5},
{t:"The gig economy's reliance on performance ratings can create feedback loops that disadvantage marginalized workers.",z:"零工经济对绩效评级的依赖可能产生对边缘化工人不利的反馈循环。",d:3,level:5},
{t:"The proliferation of smart home devices raises questions about the boundaries of domestic privacy.",z:"智能家居设备的普及引发了关于家庭隐私边界的问题。",d:3,level:5},
{t:"Collaborative platforms have enabled new forms of collective action that transcend traditional organizational boundaries.",z:"协作平台已催生了超越传统组织边界的新型集体行动形式。",d:3,level:5},
{t:"The attention economy's demands are implicated in rising rates of anxiety and diminished capacity for sustained concentration.",z:"注意力经济的要求与日益上升的焦虑率和持续专注能力下降有关。",d:3,level:5},
{t:"The regulation of artificial intelligence requires international coordination to prevent a fragmented governance landscape.",z:"人工智能的监管需要国际协调，以防止出现碎片化的治理格局。",d:3,level:5},
{t:"The concept of the attention commons frames the collective cognitive resources of society as a shared public good.",z:"注意力公地的概念将社会的集体认知资源视为一种共享公共物品。",d:3,level:5},
{t:"Online education platforms, accelerated by the pandemic, have permanently altered the landscape of tertiary instruction.",z:"由疫情加速的在线教育平台已永久改变了高等教育的格局。",d:3,level:5},
{t:"The erosion of professional journalism by digital disruption has left communities more susceptible to misinformation.",z:"数字颠覆对专业新闻业的侵蚀使社区更容易受到虚假信息的影响。",d:3,level:5},
{t:"The concept of data feminism interrogates the power structures embedded in data collection and analysis.",z:"数据女性主义的概念审视了嵌入数据收集和分析中的权力结构。",d:3,level:5},
{t:"Edge computing, which processes data closer to its source, addresses latency concerns in time-sensitive applications.",z:"边缘计算在更接近数据源的地方处理数据，解决了时间敏感应用中的延迟问题。",d:3,level:5},
{t:"The digital public sphere, while theoretically inclusive, is increasingly dominated by a small number of tech platforms.",z:"数字公共领域虽然理论上具有包容性，但日益被少数几家科技平台所主导。",d:3,level:5},
{t:"The phenomenon of cancel culture illustrates the tension between free expression and accountability in digital spaces.",z:"取消文化现象说明了数字空间中言论自由与问责之间的张力。",d:3,level:5},
{t:"Algorithmic transparency is advocated as a necessary condition for meaningful oversight of automated decision systems.",z:"算法透明度被倡导为对自动化决策系统进行有意义监督的必要条件。",d:3,level:5},
{t:"The concept of digital well-being promotes intentional and balanced engagement with technology.",z:"数字福祉的概念提倡有意识且平衡地使用技术。",d:3,level:5},
{t:"The democratization of artificial intelligence tools has lowered the barrier to entry for computational research.",z:"人工智能工具的民主化降低了计算研究的进入门槛。",d:3,level:5},
// ============ Lv.5 雅思冲刺 (Educational Reform) ============
{t:"Outcome-based education shifts the focus from instructional inputs to measurable student competencies.",z:"基于成果的教育将重点从教学投入转向可衡量的学生能力。",d:3,level:5},
{t:"The standardization of curricula, while promoting equity, may inadvertently suppress pedagogical creativity and local relevance.",z:"课程标准化虽然促进了公平，但可能无意中抑制了教学创造力和地方相关性。",d:3,level:5},
{t:"Inquiry-based learning fosters critical thinking by positioning students as active constructors of knowledge.",z:"探究式学习通过将学生定位为知识的积极构建者来培养批判性思维。",d:3,level:5},
{t:"The integration of formative assessment into classroom practice provides teachers with actionable diagnostic information.",z:"将形成性评估融入课堂实践为教师提供了可操作的诊断信息。",d:3,level:5},
{t:"The educational achievement gap between socioeconomic groups remains one of the most persistent challenges in public education.",z:"社会经济群体之间的教育成就差距仍然是公共教育中最持久的挑战之一。",d:3,level:5},
{t:"Competency-based progression models allow students to advance upon demonstrated mastery rather than seat time.",z:"基于能力的进度模型允许学生在展示掌握程度后而非仅凭学时前进。",d:3,level:5},
{t:"The deprofessionalization of teaching, driven by accountability mandates, has contributed to workforce attrition.",z:"由问责要求驱动的教学去专业化已导致教师流失。",d:3,level:5},
{t:"Differentiated instruction recognizes that students within a single classroom possess diverse learning needs and preferences.",z:"差异化教学认识到单一课堂中的学生拥有多元的学习需求和偏好。",d:3,level:5},
{t:"The gamification of learning environments has shown promise in enhancing student motivation, particularly among disengaged learners.",z:"学习环境的游戏化在增强学生动机方面展现了前景，尤其是在参与度较低的学习者中。",d:3,level:5},
{t:"The transition from teacher-centered to learner-centered pedagogies represents a paradigm shift in educational philosophy.",z:"从以教师为中心到以学习者为中心的教学法转变代表了教育哲学的范式转变。",d:3,level:5},
{t:"High-stakes testing, while intended to ensure accountability, may narrow the curriculum and promote surface-level learning.",z:"高风险考试虽然旨在确保问责，但可能使课程范围收窄并促进浅层学习。",d:3,level:5},
{t:"Social-emotional learning programs address the affective dimensions of student development alongside academic achievement.",z:"社会情感学习项目在学业成就之外关注学生发展的情感维度。",d:3,level:5},
{t:"The concept of backward design, whereby learning objectives precede instructional planning, enhances curricular coherence.",z:"逆向设计的概念——学习目标先于教学规划——增强了课程的一致性。",d:3,level:5},
{t:"Educational technology, when deployed judiciously, can enhance differentiated instruction and facilitate personalized learning.",z:"教育技术在审慎部署时可以增强差异化教学并促进个性化学习。",d:3,level:5},
{t:"The phenomenon of summer learning loss disproportionately affects students from disadvantaged socioeconomic backgrounds.",z:"暑期学习损失现象不成比例地影响来自弱势社会经济背景的学生。",d:3,level:5},
{t:"Professional learning communities foster collaborative inquiry among educators, leading to sustained pedagogical improvement.",z:"专业学习共同体促进教育者之间的协作探究，从而实现持续的教学改进。",d:3,level:5},
{t:"The inclusion of students with disabilities in mainstream classrooms requires systematic teacher preparation and resource allocation.",z:"将残疾学生纳入主流课堂需要系统的教师培训和资源分配。",d:3,level:5},
{t:"The concept of educational equity demands that systemic barriers to achievement be identified and dismantled.",z:"教育公平的概念要求识别并消除阻碍成就的系统性障碍。",d:3,level:5},
{t:"Project-based learning cultivates interdisciplinary skills by engaging students in authentic, real-world problem-solving.",z:"项目式学习通过让学生参与真实的现实世界问题解决来培养跨学科技能。",d:3,level:5},
{t:"The phenomenon of grade inflation has eroded the diagnostic value of academic transcripts as indicators of mastery.",z:"分数膨胀现象削弱了学术成绩单作为掌握程度指标的诊断价值。",d:3,level:5},
{t:"Culturally responsive pedagogy recognizes that students' cultural identities are integral to the learning process.",z:"文化响应式教学认识到学生的文化认同是学习过程不可分割的一部分。",d:3,level:5},
{t:"The establishment of universal pre-kindergarten programs has been shown to yield substantial long-term cognitive benefits.",z:"普及学前班项目的建立已被证明能产生显著的长期认知收益。",d:3,level:5},
{t:"The metacognitive dimension of learning — the ability to monitor and regulate one's own cognitive processes — is often neglected in curricula.",z:"学习的元认知维度——监控和调节自身认知过程的能力——在课程中常被忽视。",d:3,level:5},
{t:"The Flipped Classroom model inverts the traditional lecture-homework structure, allocating classroom time to active application.",z:"翻转课堂模型颠倒了传统的讲授-作业结构，将课堂时间分配给主动应用。",d:3,level:5},
{t:"Teacher retention, influenced by compensation, working conditions, and professional autonomy, is a systemic concern.",z:"教师留任——受薪酬、工作条件和专业自主权影响——是一个系统性问题。",d:3,level:5},
{t:"The concept of growth mindset, while influential, must be implemented with caution to avoid placing undue burden on students.",z:"成长型思维的概念虽然影响深远，但必须谨慎实施，以避免给学生造成过重负担。",d:3,level:5},
{t:"The integration of computational thinking into K-12 education prepares students for an increasingly data-driven world.",z:"将计算思维融入K-12教育使学生为日益数据驱动的世界做好准备。",d:3,level:5},
{t:"Charter schools, while offering innovation, have prompted debate about accountability, equity, and the privatization of education.",z:"特许学校虽然提供了创新，但引发了关于问责、公平和教育私有化的辩论。",d:3,level:5},
{t:"The concept of 21st-century skills — critical thinking, creativity, collaboration, and communication — reshapes curricular priorities.",z:"21世纪技能的概念——批判性思维、创造力、协作和沟通——重塑了课程优先事项。",d:3,level:5},
{t:"The phenomenon of tracking, whereby students are segregated by ability, can perpetuate educational inequality.",z:"分流现象——按能力将学生分隔——可能延续教育不平等。",d:3,level:5},
{t:"Universal design for learning provides a framework for creating inclusive curricula that accommodate diverse learners.",z:"通用学习设计为创建适应多元学习者的包容性课程提供了框架。",d:3,level:5},
{t:"The role of parental involvement in student achievement is well-documented but difficult to sustain in low-income communities.",z:"家长参与对学生学业成就的作用已有充分记录，但在低收入社区难以维持。",d:3,level:5},
{t:"The concept of pedagogical content knowledge highlights the unique expertise required to teach specific subjects effectively.",z:"教学内容知识的概念强调了有效教授特定学科所需的独特专业知识。",d:3,level:5},
{t:"Standardized assessments, while useful for large-scale comparisons, often fail to capture higher-order thinking skills.",z:"标准化评估虽然对大规模比较有用，但往往无法捕捉高阶思维技能。",d:3,level:5},
{t:"The phenomenon of teacher burnout is exacerbated by high-stakes accountability regimes and inadequate support structures.",z:"教师职业倦怠现象因高风险问责制度和支持结构不足而加剧。",d:3,level:5},
{t:"Inquiry-based science education positions students as investigators rather than passive recipients of established facts.",z:"探究式科学教育将学生定位为调查者而非既定事实的被动接受者。",d:3,level:5},
{t:"The concept of scaffolded instruction provides temporary supports that are gradually withdrawn as learner competence increases.",z:"脚手架式教学的概念提供了临时支持，随着学习者能力的提高逐步撤除。",d:3,level:5},
{t:"The international comparison of educational outcomes, as exemplified by PISA, has influenced national reform agendas.",z:"国际教育成果比较——以PISA为代表——影响了各国的改革议程。",d:3,level:5},
{t:"The phenomenon of hidden curriculum transmits values, norms, and social expectations beyond the formal syllabus.",z:"隐性课程现象传递了超越正式教学大纲的价值观、规范和社会期望。",d:3,level:5},
{t:"The concept of lifelong learning underscores the necessity of continuous skill development in a rapidly evolving labor market.",z:"终身学习的概念强调了在快速演变的劳动力市场中持续技能发展的必要性。",d:3,level:5},
{t:"The phenomenon of helicopter parenting has been linked to diminished student resilience and self-efficacy.",z:"直升机育儿现象与学生韧性和自我效能感的降低有关。",d:3,level:5},
{t:"The integration of service-learning into the curriculum fosters civic responsibility alongside academic learning.",z:"将服务学习融入课程在学术学习之外培养了公民责任感。",d:3,level:5}

];

    const userData=UserMgr.getData(userId);
    this.currentLevel=userData.preferences?.level||1;

    // 按级别过滤句子（导入句默认归入当前级别）
    const allSent=[...SENTENCES,...(userData.importedSentences||[]).map((t,i)=>({t,z:'(导入)',d:2,level:this.currentLevel}))];
    const levelSent=allSent.filter(s=>s.level===this.currentLevel);

    // 优先出错题（当前级别）
    const errTexts=new Set(userData.errorBook);
    let pool=levelSent.filter(s=>errTexts.has(s.t));
    const fresh=levelSent.filter(s=>!errTexts.has(s.t));
    this.sentences=pool.length>=this.totalRounds
      ?this.shuffle(pool).slice(0,this.totalRounds)
      :[...this.shuffle(pool),...this.shuffle(fresh)].slice(0,this.totalRounds);
    this.roundNum=0; this.score=0; this.combo=0;
    this.nextRound();
  },

  nextRound(){
    if(this.roundNum>=this.sentences.length){this.showResult();return;}
    this.currentSentence=this.sentences[this.roundNum];
    this.answerSlots=[];
    const words=this.currentSentence.t.replace(/[.,!?;:'"]/g,'').split(/\s+/);
    this.poolWords=this.wordsForRound(words);
    this.renderRound();
  },

  wordsForRound(words){
    // 打乱顺序用于连词成句
    return this.shuffle([...words]);
  },

  renderRound(){
    const s=this.currentSentence;
    const el=document.getElementById('page-game');
    const allWords=s.t.replace(/[.,!?;:'"]/g,'').split(/\s+/);
    const uniqueWords=[...new Set(allWords)];

    if(this.mode==='fillblank'){
      // === 自然拼读填空模式 ===
      // 将每个单词拆为拼读片段，随机遮挡部分片段
      const sentencePhonics=[];
      allWords.forEach(w=>{
        sentencePhonics.push(Phonics.breakdown(w));
      });
      // 收集所有片段，随机选2-3个遮挡
      const allSegments=[];
      sentencePhonics.forEach((parts,wi)=>{
        parts.forEach((p,pi)=>{
          allSegments.push({wordIdx:wi,partIdx:pi,part:p.part,sound:p.sound});
        });
      });
      const blankCount=Math.min(2+Math.floor(Math.random()*2), allSegments.length-2);
      const shuffledSegs=this.shuffle([...allSegments]);
      const blanks=new Map(); // key="wordIdx-partIdx" -> segment
      for(let i=0;i<blankCount;i++){
        const seg=shuffledSegs[i];
        blanks.set(`${seg.wordIdx}-${seg.partIdx}`, seg);
      }
      this._phonicsData=sentencePhonics;
      this._phonicsBlanks=blanks;
      this._phonicsAll=allWords;
      this._phonicsFilled=new Map(); // key -> 用户选择的part
      this._phonicsChoices=this.shuffle([...blanks.values()]); // 候选项
      this._selectedPhonics=null; // 当前选中的音节

      el.innerHTML=`
        <div class="game-header">第 ${this.roundNum+1}/${this.sentences.length} 题 · 拼读填空 · ⭐ ${this.score} ${this.combo>1?'· 🔥'+this.combo+'连击':''}</div>
        <div class="card" style="text-align:center">
          <div style="font-size:1.3em;color:var(--txl);margin-bottom:10px">${s.z}</div>
          <div style="margin:14px 0;font-size:1.4em;font-weight:600;line-height:2.2;display:flex;flex-wrap:wrap;justify-content:center;gap:2px 6px" id="fill-sentence"></div>
          <div style="display:flex;gap:10px;justify-content:center;margin-top:14px">
            <button class="btn btn-ghost btn-sm" onclick="GameEngine.clearAnswer()">清空</button>
            <button class="btn btn-primary btn-sm" onclick="GameEngine.check()">提交</button>
          </div>
        </div>
        <div style="text-align:center;font-size:.75em;color:var(--txl);margin:6px 0">点击下方音节，填入空位并听发音</div>
        <div class="word-pool" id="word-pool"></div>
      `;
      this.renderFillSentence();
      this.renderPhonicsPool();
    } else {
      // 连词成句模式
      el.innerHTML=`
        <div class="game-header">
          第 ${this.roundNum+1}/${this.sentences.length} 题 · ⭐ ${this.score} ${this.combo>1?'· 🔥'+this.combo+'连击':''}
        </div>
        <div class="card" style="text-align:center">
          <div style="font-size:1.3em;color:var(--txl);margin-bottom:6px">${s.z}</div>
          <button class="speak-btn" onclick="Speech.speak('${s.t.replace(/'/g,"\\'")}')">发音</button>
          <div class="game-answer" id="answer-area">
            <span class="game-answer-empty">点击下方单词拼成句子</span>
          </div>
          <div style="display:flex;gap:10px;justify-content:center;margin-top:10px">
            <button class="btn btn-ghost btn-sm" onclick="GameEngine.clearAnswer()">清空</button>
            <button class="btn btn-primary btn-sm" onclick="GameEngine.check()">提交</button>
          </div>
        </div>
        <div id="phonics-hint"></div>
        <div class="word-pool" id="word-pool"></div>
      `;
      this.renderWordPool();
    }
    // 显示自然拼读（仅连词成句模式）
    if(this.mode==='rearrange'){
      document.getElementById('phonics-hint').innerHTML=
        `<div style="width:100%;text-align:center;font-size:.75em;color:var(--txl);margin-bottom:2px">拼读参考</div>`+
        Phonics.displayRow(uniqueWords);
    }
  },

  renderFillSentence(){
    const el=document.getElementById('fill-sentence');
    const phonics=this._phonicsData;
    const blanks=this._phonicsBlanks;
    const filled=this._phonicsFilled;
    const selected=this._selectedPhonics;
    let html='';
    phonics.forEach((parts,wi)=>{
      parts.forEach((p,pi)=>{
        const key=`${wi}-${pi}`;
        if(blanks.has(key)){
          if(filled.has(key)){
            const chosen=filled.get(key);
            const isCorrect=chosen.part.toLowerCase()===blanks.get(key).part.toLowerCase();
            html+=`<span style="background:${isCorrect?'var(--s)':'var(--err)'};color:#fff;border-radius:5px;padding:2px 8px;cursor:pointer;font-size:.9em" 
              onclick="GameEngine.onFilledClick(${wi},${pi})">${chosen.part}</span>`;
          } else {
            // 空位 — 可点击
            html+=`<span class="blank-slot" id="blank-${wi}-${pi}" style="display:inline-block;min-width:48px;border-bottom:2.5px dashed ${selected?'var(--s)':'var(--a)'};padding:2px 8px;text-align:center;color:${selected?'var(--s)':'var(--a)'};font-weight:700;cursor:${selected?'pointer':'default'};transition:all .15s" 
              onclick="GameEngine.fillBlank(${wi},${pi})">?</span>`;
          }
        } else {
          html+=`<span>${p.part}</span>`;
        }
      });
      html+='<span style="width:8px"></span>';
    });
    el.innerHTML=html;
  },

  onFilledClick(wi,pi){
    // 点击已填入的片段 → 移除（退回池中）
    const key=`${wi}-${pi}`;
    if(this._phonicsFilled.has(key)){
      this._phonicsFilled.delete(key);
      this._selectedPhonics=null;
      this.renderFillSentence();
      this.renderPhonicsPool();
    }
  },

  fillBlank(wi,pi){
    // 点击空位 — 将当前选中的音节填入
    if(!this._selectedPhonics) return; // 没有选中任何音节
    const key=`${wi}-${pi}`;
    if(this._phonicsFilled.has(key)) return; // 已填
    if(!this._phonicsBlanks.has(key)) return; // 不是空位
    
    const choice=this._selectedPhonics;
    this._phonicsFilled.set(key, choice);
    this._selectedPhonics=null;
    // 播放片段发音
    Speech.speak(choice.part, 0.6);
    this.renderFillSentence();
    this.renderPhonicsPool();
  },

  renderPhonicsPool(){
    const el=document.getElementById('word-pool');
    if(!el) return;
    const choices=this._phonicsChoices;
    const filled=this._phonicsFilled;
    const selected=this._selectedPhonics;
    // 检查哪些已经被选了
    const usedParts=[];
    filled.forEach((v)=>usedParts.push(v));
    el.innerHTML=choices.map((c,i)=>{
      const isUsed=usedParts.some(u=>u.wordIdx===c.wordIdx&&u.partIdx===c.partIdx);
      const isSelected=selected&&selected.wordIdx===c.wordIdx&&selected.partIdx===c.partIdx;
      const cls=isSelected?'word-btn-active':isUsed?'word-btn used':'word-btn';
      return `<span class="${cls}" onclick="GameEngine.selectPhonics(${i})" style="${isSelected?'background:var(--tx);color:#fff;border-color:var(--tx)':''}">${c.part}<span style="font-size:.7em;opacity:.7;margin-left:3px">${c.sound}</span></span>`;
    }).join('');
    // 提示
    if(selected){
      el.insertAdjacentHTML('afterbegin','<div style="width:100%;text-align:center;font-size:.78em;color:var(--s);margin-bottom:6px">已选中「'+selected.part+'」，点击上方空位填入</div>');
    }
  },

  selectPhonics(choiceIdx){
    const choice=this._phonicsChoices[choiceIdx];
    // 检查是否已填
    const key=`${choice.wordIdx}-${choice.partIdx}`;
    if(this._phonicsFilled.has(key)) return;
    // 切换选中状态
    if(this._selectedPhonics&&this._selectedPhonics.wordIdx===choice.wordIdx&&this._selectedPhonics.partIdx===choice.partIdx){
      this._selectedPhonics=null; // 取消选中
    } else {
      this._selectedPhonics=choice; // 选中
      Speech.speak(choice.part, 0.6); // 点击时先听发音
    }
    this.renderFillSentence();
    this.renderPhonicsPool();
  },

  renderAnswerArea(){
    const el=document.getElementById('answer-area');
    if(!el) return;
    if(this.answerSlots.length===0){
      el.innerHTML='<span class="game-answer-empty">点击下方单词拼成句子</span>';
    } else {
      el.innerHTML=this.answerSlots.map((w,i)=>
        `<span class="answer-word" onclick="GameEngine.removeFromAnswer(${i})">${w}</span>`
      ).join('');
    }
  },

  renderWordPool(){
    const el=document.getElementById('word-pool');
    if(!el) return;
    if(this.mode==='fillblank'){
      this.renderPhonicsPool();
    } else {
      el.innerHTML=this.poolWords.map((w,i)=>{
        const usedCount=this.answerSlots.filter(x=>x===w).length;
        const totalCount=this.poolWords.filter(x=>x===w).length;
        return `<span class="word-btn ${usedCount>=totalCount?'used':''}" onclick="GameEngine.addToAnswer('${w.replace(/'/g,"\\'")}')">${w}</span>`;
      }).join('');
    }
  },

  addToAnswer(word){
    const usedCount=this.answerSlots.filter(x=>x===word).length;
    const totalCount=this.poolWords.filter(x=>x===word).length;
    if(usedCount>=totalCount) return;
    this.answerSlots.push(word);
    Speech.speak(word, 0.7); // 点击时朗读
    this.renderAnswerArea();
    this.renderWordPool();
  },

  removeFromAnswer(index){
    this.answerSlots.splice(index,1);
    this.renderAnswerArea();
    this.renderWordPool();
  },

  clearAnswer(){
    this.answerSlots=[];
    this.renderAnswerArea();
    if(this.mode==='fillblank'){
      this._phonicsFilled.clear();
      this._selectedPhonics=null;
      this.renderFillSentence();
      this.renderPhonicsPool();
    } else {
      this.renderWordPool();
    }
  },

  check(){
    const userId=UserMgr.getActive();
    const userData=UserMgr.getData(userId);
    const s=this.currentSentence;
    const standard=s.t.replace(/[.,!?;:'"]/g,'').split(/\s+/).join(' ');

    let userAnswer, feedback, scoreAdd, rating;

    if(this.mode==='fillblank'){
      // 自然拼读填空检查
      const blanks=this._phonicsBlanks;
      const filled=this._phonicsFilled;
      let allCorrect=true;
      blanks.forEach((seg,key)=>{
        const userChoice=filled.get(key);
        if(!userChoice || userChoice.part.toLowerCase()!==seg.part.toLowerCase()){
          allCorrect=false;
        }
      });
      // 高亮正确/错误
      blanks.forEach((seg,key)=>{
        const [wi,pi]=key.split('-').map(Number);
        const el=document.getElementById(`blank-${wi}-${pi}`);
        const userChoice=filled.get(key);
        if(el){
          if(userChoice && userChoice.part.toLowerCase()===seg.part.toLowerCase()){
            el.style.borderBottomColor='var(--ok)';
            el.style.color='var(--ok)';
          } else {
            el.style.borderBottomColor='var(--err)';
            el.style.color='var(--err)';
            el.textContent=seg.part;
          }
        }
      });
      // 朗读整个句子
      Speech.speak(s.t);
      userAnswer=allCorrect?'拼读全部正确':`正确: ${[...blanks.values()].map(b=>b.part).join(', ')}`;
      rating=allCorrect?'Perfect!':'再检查一下';
      scoreAdd=allCorrect?(10+Math.min(++this.combo,10)*2):0;
      feedback=allCorrect?'correct':'wrong';
    } else {
      // 连词成句检查
      userAnswer=this.answerSlots.join(' ');
      if(userAnswer.toLowerCase()===standard.toLowerCase()){
        rating='Perfect!';
        this.combo++;
        scoreAdd=10+Math.min(this.combo,10)*2;
        feedback='correct';
      } else if(userAnswer.toLowerCase()===standard.toLowerCase()){
        rating='不错!';
        this.combo=0; scoreAdd=5; feedback='correct';
      } else {
        rating='再试试';
        this.combo=0; scoreAdd=0; feedback='wrong';
      }
    }

    if(feedback==='wrong'){
      if(!userData.errorBook.includes(s.t)) userData.errorBook.push(s.t);
      this.wrongSentence={user:userAnswer, correct:s.t};
    } else {
      this.wrongSentence=null;
    }

    this.score+=scoreAdd;
    userData.progress.score+=scoreAdd;
    userData.progress.totalSentences++;
    if(feedback!=='wrong') userData.progress.correctSentences++;
    userData.progress.learned++;
    UserMgr.saveData(userId,userData);

    // 评分弹出
    const popup=document.createElement('div');
    document.body.appendChild(popup);
    popup.className=`score-popup ${feedback==='wrong'?'wrong':scoreAdd>10?'perfect':'correct'}`;
    popup.textContent=rating+(scoreAdd>0?' +'+scoreAdd:'');
    setTimeout(()=>popup.remove(),900);

    if(feedback==='wrong'&&this.wrongSentence){
      const el=document.getElementById('page-game');
      const fb=document.createElement('div');
      fb.className='wrong-answer';
      fb.innerHTML=`<div style="margin-bottom:8px">正确答案: <span class="correct-text">${s.t}</span></div>
        <button class="speak-btn" style="margin-bottom:4px" onclick="Speech.speak('${s.t.replace(/'/g,"\\'")}')">听发音</button>
        ${AIEngine.getConfig().apiKey?`<div><button class="btn btn-primary btn-sm" onclick="GameEngine.showAI()" style="margin-top:4px">AI语法讲解</button></div>`:''}
        <div id="ai-result"></div>`;
      el.querySelector('.card').appendChild(fb);
      setTimeout(()=>{if(fb.parentNode)fb.remove();},4000);
    }

    // 朗读正确句子
    Speech.speak(s.t);

    // 下一题
    setTimeout(()=>{this.roundNum++;this.nextRound();},feedback==='wrong'?2800:1600);
  },

  async showAI(){
    if(!this.wrongSentence) return;
    const el=document.getElementById('ai-result');
    if(!el) return;
    el.innerHTML='<div style="color:var(--txl);font-size:.85em">正在请求AI分析...</div>';
    const result=await AIEngine.explain(this.wrongSentence.user,this.wrongSentence.correct);
    el.innerHTML=`<div style="background:rgba(61,139,110,.05);border-radius:8px;padding:12px;margin-top:8px;font-size:.85em;white-space:pre-wrap;text-align:left;line-height:1.6">${result}</div>`;
  },

  showResult(){
    const userId=UserMgr.getActive();
    const userData=UserMgr.getData(userId);
    const acc=userData.progress.totalSentences>0
      ?Math.round(userData.progress.correctSentences/userData.progress.totalSentences*100):0;
    const el=document.getElementById('page-game');
    el.innerHTML=`
      <div class="card" style="text-align:center">
        <div style="font-size:3.5em;margin-bottom:8px">${acc>=80?'🏆':acc>=50?'😊':'💪'}</div>
        <h2>${acc>=80?'太棒了！':acc>=50?'做得不错！':'继续加油！'}</h2>
        <p style="font-size:1.3em;margin:16px 0;font-weight:600">本轮得分: ${this.score}</p>
        <p style="color:var(--txl)">累计正确率: ${acc}%</p>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:20px">
          <button class="btn btn-ghost" onclick="go('dashboard')">返回首页</button>
          <button class="btn btn-primary" onclick="GameEngine.start()">再来一轮</button>
        </div>
      </div>`;
    if(acc>=80) confetti();
    Achievements.check();
  },

  shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
};

const ImportEngine = {
  render(){
    const el=document.getElementById('page-import');
    const userId=UserMgr.getActive();
    const ud=UserMgr.getData(userId);
    const ic=ud.importedSentences?ud.importedSentences.length:0;

      <p style="color:var(--txl);font-size:.85em;margin-bottom:14px">粘贴英文课文、外刊、歌词等文本，自动按句号/问号/感叹号切割</p>
      <textarea id="import-text" class="import-area" placeholder="在这里粘贴英文文本...\n\n例如:\nThe quick brown fox jumps over the lazy dog.\nShe sells seashells by the seashore.\nHow much wood would a woodchuck chuck?"></textarea>
      <div style="display:flex;gap:10px;margin-top:12px">
        <button class="btn btn-primary" onclick="ImportEngine.importText()">导入句子</button>
        <button class="btn btn-ghost" onclick="ImportEngine.clearImported()">清空导入</button>
      </div>
      <p style="color:var(--txl);font-size:.8em;margin-top:12px">已导入: ${ic} 句 · 内置: ${SENTENCES.length} 句 · 共计: ${SENTENCES.length+ic} 句</p>`;
  },
  importText(){
    const userId=UserMgr.getActive();
    if(!userId)return;
    const text=document.getElementById('import-text').value.trim();
    if(!text){toast('请先粘贴文本');return;}
    const raw=text.split(/(?<=[.!?])\s+/);
    const sents=raw.map(s=>s.trim()).filter(s=>s.length>5&&/[a-zA-Z]/.test(s));
    if(!sents.length){toast('未能解析出句子');return;}
    const ud=UserMgr.getData(userId);
    if(!ud.importedSentences) ud.importedSentences=[];
    ud.importedSentences.push(...sents);
    UserMgr.saveData(userId,ud);
    document.getElementById('import-text').value='';
    toast(`成功导入 ${sents.length} 个句子`);
    this.render();
  },
  clearImported(){
    const userId=UserMgr.getActive();
    if(!userId)return;
    if(!confirm('确定清空所有导入句子？'))return;
    const ud=UserMgr.getData(userId);
    ud.importedSentences=[];
    UserMgr.saveData(userId,ud);
    toast('已清空导入句子');
    this.render();
  }
};

// ==================== AI 语法解析 ====================
const AIEngine = {
  getConfig(){ return JSON.parse(localStorage.getItem('aiConfig')||'{}'); },
  saveConfig(c){ localStorage.setItem('aiConfig',JSON.stringify(c)); },
  async explain(userSentence,correctSentence){
    const config=this.getConfig();
    if(!config.baseUrl||!config.apiKey) return '请先在设置中配置AI接口';
    const prompt=`你是一位英语老师。学生拼写了这句话：'${userSentence}'\n正确答案是：'${correctSentence}'\n请对比两句话，用简单的中文解释语法错误，包括时态、介词、单复数、语序、拼写等方面。用通俗易懂的语言，适合小学生理解。`;
    try{
      const r=await fetch(`${config.baseUrl}/v1/chat/completions`,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${config.apiKey}`},
        body:JSON.stringify({model:config.model||'MiMo-7B-Chat',messages:[{role:'user',content:prompt}],max_tokens:500,temperature:0.3})
      });
      const d=await r.json();
      return d.choices?.[0]?.message?.content||'AI未返回结果';
    }catch(e){return `请求失败: ${e.message}\n请检查接口地址和Key`;}
  },
  renderSettings(){
    const el=document.getElementById('page-settings');
    const config=this.getConfig();
    const ok=config.baseUrl&&config.apiKey;
    const userId=UserMgr.getActive();
    const ud=userId?UserMgr.getData(userId):null;
    const acc=ud&&ud.progress.totalSentences>0?Math.round(ud.progress.correctSentences/ud.progress.totalSentences*100):0;
    el.innerHTML=`<h2 style="margin-bottom:14px">设置</h2>
      <div class="card">
        <h3 style="margin-bottom:4px">AI语法讲解配置</h3>
        <p style="color:var(--txl);font-size:.8em;margin-bottom:12px">对接本地MiMo V2.5模型，答错时可获取AI讲解</p>
        <div class="settings">
          <div><label>Base URL</label><input type="text" id="ai-base" placeholder="例如: http://localhost:8080" value="${config.baseUrl||''}"></div>
          <div><label>API Key</label><input type="password" id="ai-key" placeholder="填写API Key" value="${config.apiKey||''}"></div>
          <div><label>模型名称</label><input type="text" id="ai-model" placeholder="默认: MiMo-7B-Chat" value="${config.model||''}"></div>
          <button class="btn btn-primary" onclick="AIEngine.saveSettings()">保存设置</button>
        </div>
        <p style="color:${ok?'var(--ok)':'var(--err)'};font-size:.85em;margin-top:8px">${ok?'AI功能已就绪':'未配置，AI功能不可用'}</p>
      </div>
      <div class="card"><h3 style="margin-bottom:6px">当前用户</h3>
        <p style="margin-bottom:8px">用户: <strong>${UserMgr.getCurrent()?.name||'未选择'}</strong></p>
        <button class="btn btn-ghost btn-sm" onclick="showUserModal()">切换用户</button>
      </div>
      <div class="card"><h3 style="margin-bottom:6px">学习统计</h3>
        <p style="font-size:.88em;color:var(--txl)">总分: ⭐ ${ud?ud.progress.score:0} · 练习: ${ud?ud.progress.totalSentences:0}次 · 正确率: ${acc}%<br>
        连续: 🔥 ${ud?ud.progress.streak:0}天 · 错题: ${ud?ud.errorBook.length:0}道 · 导入: ${ud?(ud.importedSentences||[]).length:0}句</p>
      </div>`;
  },
  saveSettings(){
    this.saveConfig({
      baseUrl:document.getElementById('ai-base').value.trim(),
      apiKey:document.getElementById('ai-key').value.trim(),
      model:document.getElementById('ai-model').value.trim()
    });
    toast('设置已保存');
    this.renderSettings();
  }
};

// ==================== 成就系统 ====================
const Achievements={
  list:[
    {id:'first',n:'初学者',d:'完成第1次练习',e:'🌱',ck:s=>s.total>=1},
    {id:'ten',n:'小有成就',d:'完成10次练习',e:'🌿',ck:s=>s.total>=10},
    {id:'fifty',n:'坚持不懈',d:'完成50次练习',e:'🌳',ck:s=>s.total>=50},
    {id:'hundred',n:'百战百胜',d:'完成100次练习',e:'🏆',ck:s=>s.total>=100},
    {id:'combo5',n:'连击达人',d:'达到5连击',e:'🔥',ck:s=>s.combo>=5},
    {id:'streak3',n:'三天坚持',d:'连续学习3天',e:'📅',ck:s=>s.streak>=3},
    {id:'streak7',n:'一周达人',d:'连续学习7天',e:'📆',ck:s=>s.streak>=7},
    {id:'score500',n:'积分高手',d:'总积分达到500',e:'💰',ck:s=>s.score>=500},
    {id:'clear10',n:'消灭错题',d:'标记10道错题已掌握',e:'✅',ck:s=>s.cleared>=10},
    {id:'import50',n:'题库达人',d:'导入50个句子',e:'📥',ck:s=>s.imported>=50},
    {id:'allperfect',n:'全对达人',d:'正确率达到100%（5题以上）',e:'💯',ck:s=>s.total>=5&&s.acc===100},
    {id:'earlybird',n:'早起鸟',d:'连续天数达到14天',e:'🐦',ck:s=>s.streak>=14},
  ],
  check(){
    const userId=UserMgr.getActive();if(!userId)return;
    const ud=UserMgr.getData(userId),p=ud.progress;
    const acc=p.totalSentences>0?Math.round(p.correctSentences/p.totalSentences*100):0;
    const stats={total:p.totalSentences||0,score:p.score||0,streak:p.streak||0,
      imported:(ud.importedSentences||[]).length,acc,
      combo:ud._maxCombo||0,cleared:ud._cleared||0};
    this.list.forEach(a=>{
      if(!ud.achievements.includes(a.id)&&a.ck(stats)){
        ud.achievements.push(a.id);
        UserMgr.saveData(userId,ud);
        toast(`新成就解锁: ${a.n}`);
      }
    });
  },
  render(){
    const userId=UserMgr.getActive();
    const ud=UserMgr.getData(userId);
    document.getElementById('page-achievements').innerHTML=`<h2 style="margin-bottom:14px">成就墙</h2>
      <div class="ach-grid">${this.list.map(a=>{
        const ok=ud.achievements.includes(a.id);
        return `<div class="ach-card ${ok?'unlocked':'locked'}">
          <div style="font-size:2em">${a.e}</div>
          <div style="font-weight:600;margin:4px 0;font-size:.85em">${a.n}</div>
          <div style="color:var(--txl);font-size:.72em">${a.d}</div>
          <div style="font-size:.7em;margin-top:3px;color:${ok?'var(--ok)':'var(--txll)'}">${ok?'已解锁':'未解锁'}</div>
        </div>`;
      }).join('')}</div>`;
  }
};

// ==================== 工具函数 ====================
function confetti(){
  const c=document.getElementById('confetti'),ctx=c.getContext('2d');
  c.width=innerWidth;c.height=innerHeight;
  const ps=[];const cols=['#E07A5F','#3D8B6E','#F4A261','#264653','#2A9D8F','#E9C46A'];
  for(let i=0;i<60;i++) ps.push({x:Math.random()*c.width,y:-10,w:Math.random()*8+4,h:Math.random()*5+2,
    color:cols[~~(Math.random()*cols.length)],vx:(Math.random()-.5)*3,vy:Math.random()*3+1.5,
    r:Math.random()*360,rs:(Math.random()-.5)*8});
  let f=0;const an=()=>{ctx.clearRect(0,0,c.width,c.height);f++;
    ps.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.r+=p.rs;p.vy+=.04;});
    if(f<90)requestAnimationFrame(an);else ctx.clearRect(0,0,c.width,c.height);};
  an();
}

function toast(msg){
  const b=document.getElementById('toast-box'),t=document.createElement('div');
  t.className='toast';t.textContent=msg;b.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}

// ==================== 用户弹窗 ====================
function showUserModal(){
  const users=UserMgr.getAll(),activeId=UserMgr.getActive();
  const avatars=['C','D','R','B','F','P','T','S','W','X']; // 简单字母头像
  let selAvatar=avatars[0];
  const box=document.getElementById('modal-box');
  box.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3 style="margin-bottom:14px">选择用户</h3>
      <div id="user-list">${users.length?users.map(u=>`
        <div style="display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;margin-bottom:6px;cursor:pointer;${u.id===activeId?'background:rgba(38,70,83,.06)':'background:transparent'}"
          onclick="switchUser('${u.id}')">
          <div style="width:36px;height:36px;border-radius:50%;background:var(--tx);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85em">${u.avatar}</div>
          <span style="font-weight:600;flex:1">${u.name}</span>
          <span style="color:var(--txl);font-size:.78em">${u.role==='child'?'小朋友':'大人'}</span>
          <span style="cursor:pointer;padding:4px;border-radius:6px" onclick="event.stopPropagation();deleteUser('${u.id}')" title="删除">×</span>
        </div>`).join(''):'<p style="color:var(--txl);font-size:.85em">还没有用户，请新建</p>'}</div>
      <div style="border-top:1px solid #eee;margin-top:14px;padding-top:14px">
        <h4 style="margin-bottom:8px;font-size:.9em">新建用户</h4>
        <input type="text" id="new-name" placeholder="输入名字" style="width:100%;padding:9px 12px;border:1.5px solid #D5D0C8;border-radius:8px;font-size:.9em;margin-bottom:8px;font-family:var(--font-sans)">
        <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap" id="avatar-picker">${avatars.map(a=>
          `<div style="width:34px;height:34px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8em;cursor:pointer;border:2px solid ${a===selAvatar?'var(--tx)':'transparent'}" data-av="${a}" onclick="document.querySelectorAll('#avatar-picker div').forEach(d=>d.style.borderColor='transparent');this.style.borderColor='var(--tx)';window._selAv='${a}'">${a}</div>`
        ).join('')}</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary" style="flex:1" onclick="createUser('child')">小朋友</button>
          <button class="btn btn-primary" style="flex:1" onclick="createUser('parent')">大人</button>
        </div>
      </div>
    </div></div>`;
  window._selAv=avatars[0];
  document.getElementById('new-name').focus();
}
function closeModal(){ document.getElementById('modal-box').innerHTML=''; }
function switchUser(id){ UserMgr.setActive(id);closeModal();updateNavProfile();go(currentPage); }
function deleteUser(id){
  if(!confirm('确定删除此用户？所有数据不可恢复'))return;
  UserMgr.remove(id);closeModal();
  if(!UserMgr.getActive())showUserModal();
  else{updateNavProfile();go(currentPage);}
}
function createUser(role){
  const name=document.getElementById('new-name').value.trim();
  if(!name){toast('请输入名字');return;}
  const avatar=window._selAv||'C';
  const id=UserMgr.create(name,role,avatar);
  if(!id){toast('用户名已存在');return;}
  closeModal();updateNavProfile();go('dashboard');
  toast(`欢迎, ${name}!`);
  confetti();
}
function updateNavProfile(){
  const p=UserMgr.getCurrent();
  document.getElementById('nav-profile').innerHTML=p
    ?`<div style="width:28px;height:28px;border-radius:50%;background:var(--tx);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75em">${p.avatar}</div>${p.name}`
    :'选择用户';
}

// ==================== 路由 ====================
let currentPage='dashboard';
function go(page){
  currentPage=page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
  const el=document.getElementById('page-'+page);
  if(el)el.classList.add('active');
  const nl=document.querySelector(`.nav-link[data-p="${page}"]`);
  if(nl)nl.classList.add('active');
  switch(page){
    case'dashboard':renderDashboard();break;
    case'game':GameEngine.start();break;
    case'review':ReviewEngine.render();break;
    case'import':ImportEngine.render();break;
    case'settings':AIEngine.renderSettings();break;
    case'achievements':Achievements.render();break;
  }
}

// ==================== 首页 ====================
function renderDashboard(){
  const userId=UserMgr.getActive();
  if(!userId){showUserModal();return;}
  const profile=UserMgr.getCurrent();
  const ud=UserMgr.getData(userId);
  UserMgr.updateStreak(userId);
  const p=ud.progress;
  const acc=p.totalSentences>0?Math.round(p.correctSentences/p.totalSentences*100):0;
  const currentLevel=ud.preferences?.level||1;
  const levelSent=SENTENCES.filter(s=>s.level===currentLevel);
  const totalLevel=levelSent.length+(ud.importedSentences||[]).length;
  const totalAll=SENTENCES.length+(ud.importedSentences||[]).length;
  document.getElementById('page-dashboard').innerHTML=`
    <div style="text-align:center;margin-bottom:20px">
      <h1 style="font-family:var(--font-serif);font-size:1.8em;letter-spacing:-.02em">你好，${profile.name}</h1>
      <p style="color:var(--txl);font-size:.88em">今天也要加油学英语</p>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num">${p.streak||0}</div><div class="stat-label">连续天数</div></div>
      <div class="stat-box"><div class="stat-num">${p.score||0}</div><div class="stat-label">总积分</div></div>
      <div class="stat-box"><div class="stat-num">${acc}%</div><div class="stat-label">正确率</div></div>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:.78em;color:var(--txl);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">学习级别</div>
      <div class="mode-tabs" id="level-tabs" style="flex-wrap:wrap">
        <div class="mode-tab ${currentLevel===1?'active':''}" onclick="setLevel(1)" style="flex:1;min-width:0">Lv.1</div>
        <div class="mode-tab ${currentLevel===2?'active':''}" onclick="setLevel(2)" style="flex:1;min-width:0">Lv.2</div>
        <div class="mode-tab ${currentLevel===3?'active':''}" onclick="setLevel(3)" style="flex:1;min-width:0">Lv.3</div>
        <div class="mode-tab ${currentLevel===4?'active':''}" onclick="setLevel(4)" style="flex:1;min-width:0">Lv.4</div>
        <div class="mode-tab ${currentLevel===5?'active':''}" onclick="setLevel(5)" style="flex:1;min-width:0">Lv.5</div>
      </div>
      <div style="font-size:.75em;color:var(--txll);margin-top:4px">当前: ${totalLevel}句可练 · 全部: ${totalAll}句</div>
    </div>
    <div class="mode-tabs">
      <div class="mode-tab ${GameEngine.mode==='rearrange'?'active':''}" id="tab-rearrange" onclick="setGameMode('rearrange')">连词成句</div>
      <div class="mode-tab ${GameEngine.mode==='fillblank'?'active':''}" id="tab-fillblank" onclick="setGameMode('fillblank')">拼读填空</div>
    </div>
    <div class="func-grid">
      <div class="func-card" onclick="go('game')">
        <div style="font-size:1.6em">🧩</div><h3>开始闯关</h3>
        <p>${totalLevel}句可练</p>
      </div>
      <div class="func-card" onclick="ReviewEngine.startQuiz()">
        <div style="font-size:1.6em">📖</div><h3>错题复习</h3>
        <p>${ud.errorBook.length}道待复习</p>
      </div>
      <div class="func-card" onclick="go('import')">
        <div style="font-size:1.6em">📥</div><h3>导入题库</h3>
        <p>粘贴英文文本</p>
      </div>
      <div class="func-card" onclick="go('achievements')">
        <div style="font-size:1.6em">🏆</div><h3>成就墙</h3>
        <p>${ud.achievements.length}/${Achievements.list.length}已解锁</p>
      </div>
    </div>`;
}

function setLevel(level){
  const userId=UserMgr.getActive();
  if(!userId) return;
  const ud=UserMgr.getData(userId);
  if(!ud.preferences) ud.preferences={};
  ud.preferences.level=level;
  UserMgr.saveData(userId,ud);
  GameEngine.currentLevel=level;
  renderDashboard(); // 刷新首页显示
}

function setGameMode(mode){
  GameEngine.mode=mode;
  document.querySelectorAll('.mode-tabs:not(#level-tabs) .mode-tab').forEach(t=>t.classList.remove('active'));
  const el=document.getElementById('tab-'+mode);
  if(el) el.classList.add('active');
}

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded',()=>{
  const active=UserMgr.getActive();
  updateNavProfile();
  if(active)go('dashboard');
  else{go('dashboard');setTimeout(showUserModal,300);}
});

// === PWA Service Worker 注册 ===
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
