<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语小乐园</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="英语小乐园">
<meta name="theme-color" content="#264653">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>">
<style>
:root{
  --p:#E07A5F;--p-l:#F2CC8F;--s:#3D8B6E;--s-l:#81B29A;
  --a:#F4A261;--bg:#FAF7F2;--card:#FFFFFF;--card-hover:#F8F6F3;
  --tx:#264653;--txl:#6B7B8D;--txll:#A0ADB8;
  --ok:#2A9D8F;--err:#E76F51;--warn:#E9C46A;
  --r:14px;--sh:0 2px 12px rgba(38,70,83,.07);
  --font-sans: "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB",sans-serif;
  --font-serif: "Newsreader","Source Serif 4","Georgia","Songti SC",serif;
  --font-mono: "SF Mono","Fira Code","Consolas",monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg);color:var(--tx);font-size:16px;line-height:1.6}
a{text-decoration:none;color:inherit}

/* === 导航 === */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--card);box-shadow:var(--sh);position:sticky;top:0;z-index:100}
.nav-brand{font-family:var(--font-serif);font-weight:700;font-size:1.15em;cursor:pointer;letter-spacing:-.02em}
.nav-links{display:flex;gap:2px}
.nav-link{padding:6px 14px;border-radius:8px;font-size:.82em;font-weight:500;cursor:pointer;transition:all .2s;color:var(--txl)}
.nav-link:hover{background:rgba(38,70,83,.05);color:var(--tx)}
.nav-link.active{background:var(--tx);color:#fff}
.nav-profile{display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600;font-size:.9em;padding:4px 12px;border-radius:8px;transition:background .2s}
.nav-profile:hover{background:rgba(38,70,83,.05)}

/* === 页面 === */
.page{display:none;padding:24px;max-width:780px;margin:0 auto}
.page.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* === 按钮 === */
.btn{border:none;border-radius:10px;padding:10px 20px;font-size:.9em;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font-sans)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--tx);color:#fff}.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--s);color:#fff}.btn-secondary:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--tx);border:1.5px solid #ddd}.btn-ghost:hover{border-color:var(--tx)}
.btn-sm{padding:6px 14px;font-size:.8em}
.btn-lg{padding:14px 32px;font-size:1em;border-radius:12px}

/* === 卡片 === */
.card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:14px;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 20px rgba(38,70,83,.1)}

/* === 弹窗 === */
.modal-overlay{position:fixed;inset:0;background:rgba(38,70,83,.4);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border-radius:16px;padding:28px;max-width:440px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}

/* === 统计 === */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-box{background:var(--card);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--sh)}
.stat-num{font-size:2em;font-weight:700;font-family:var(--font-serif);color:var(--tx)}
.stat-label{font-size:.75em;color:var(--txl);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* === 功能网格 === */
.func-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.func-card{background:var(--card);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .2s;box-shadow:var(--sh);text-align:center}
.func-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(38,70,83,.1)}
.func-card h3{font-size:.95em;margin-top:8px}
.func-card p{font-size:.78em;color:var(--txl);margin-top:2px}

/* === 连词成句 === */
.game-header{text-align:center;margin-bottom:12px;font-size:.85em;color:var(--txl)}
.game-answer{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:48px;padding:14px;background:#F0EDE8;border-radius:10px;margin-bottom:14px;align-items:center}
.game-answer-empty{color:var(--txll);font-style:italic;font-size:.85em}
.answer-word{background:var(--tx);color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:.9em;transition:all .15s}
.answer-word:hover{opacity:.8}
.word-pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0}
.word-btn{background:var(--card);border:1.5px solid #D5D0C8;border-radius:8px;padding:8px 16px;cursor:pointer;transition:all .15s;font-size:.9em;font-weight:500}
.word-btn:hover{border-color:var(--tx);background:var(--card-hover)}
.word-btn.used{opacity:.25;pointer-events:none;border-color:transparent}
.word-btn.dbl-underline{border-bottom:2px solid var(--a)}

/* === 自然拼读 === */
.phonics-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:12px 0;padding:10px;background:rgba(61,139,110,.04);border-radius:10px}
.phonics-chip{display:inline-flex;flex-direction:column;align-items:center;padding:4px 8px;border-radius:6px;background:rgba(61,139,110,.08);font-size:.82em}
.phonics-part{font-weight:600;color:var(--s);font-family:var(--font-mono);font-size:.9em}
.phonics-sound{font-size:.75em;color:var(--txl)}

/* === 发音按钮 === */
.speak-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1.5px solid var(--a);color:var(--tx);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.82em;transition:all .15s;font-weight:500}
.speak-btn:hover{background:var(--a);color:#fff}
.speak-btn:active{transform:scale(.95)}

/* === 评分弹出 === */
.score-popup{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-size:1.8em;font-weight:700;z-index:300;pointer-events:none;animation:popScore .9s forwards}
.score-popup.perfect{color:var(--ok)}.score-popup.correct{color:var(--a)}.score-popup.wrong{color:var(--err)}
@keyframes popScore{0%{opacity:1;transform:translate(-50%,-50%) scale(.6)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-70%) scale(1)}}

/* === 错误反馈 === */
.wrong-answer{background:rgba(231,111,81,.06);border:1px solid rgba(231,111,81,.2);border-radius:10px;padding:14px;text-align:center;margin:10px 0;animation:fadeIn .3s}
.wrong-answer .correct-text{font-weight:600;color:var(--err);font-size:1.05em}

/* === 导入 === */
.import-area{width:100%;min-height:120px;border:1.5px dashed #C8C3BA;border-radius:10px;padding:14px;font-size:.9em;resize:vertical;font-family:var(--font-sans);background:rgba(255,255,255,.5);transition:border-color .2s}
.import-area:focus{border-color:var(--tx);outline:none}

/* === 设置 === */
.settings label{font-weight:600;display:block;margin-bottom:4px;font-size:.85em}
.settings input{width:100%;padding:10px 12px;border:1.5px solid #D5D0C8;border-radius:8px;font-size:.9em;font-family:var(--font-sans);transition:border-color .2s}
.settings input:focus{border-color:var(--tx);outline:none}

/* === 成就 === */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.ach-card{background:var(--card);border-radius:var(--r);padding:16px;text-align:center;box-shadow:var(--sh);transition:all .2s}
.ach-card.locked{opacity:.4;filter:grayscale(.8)}
.ach-card.unlocked{border:2px solid var(--a)}

/* === 填空模式 === */
.fill-blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--tx);padding:2px 4px;margin:0 3px;font-weight:600;text-align:center}
.fill-input{border:none;border-bottom:2px solid var(--s);background:transparent;font-size:inherit;font-family:inherit;text-align:center;min-width:80px;padding:2px 4px;font-weight:600;outline:none}
.fill-input:focus{border-bottom-color:var(--tx)}
.fill-input.correct{border-bottom-color:var(--ok);color:var(--ok)}
.fill-input.wrong{border-bottom-color:var(--err);color:var(--err);text-decoration:line-through}

/* === Toast === */
#toast-box{position:fixed;top:68px;right:16px;z-index:10000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border-radius:10px;padding:10px 18px;box-shadow:0 4px 16px rgba(0,0,0,.12);font-weight:500;font-size:.85em;animation:slideIn .25s}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* === Confetti === */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:9999}

/* === 模式选择 === */
.mode-tabs{display:flex;gap:4px;background:rgba(38,70,83,.05);border-radius:10px;padding:3px;margin-bottom:16px}
.mode-tab{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:.82em;font-weight:600;cursor:pointer;transition:all .2s;color:var(--txl)}
.mode-tab.active{background:var(--card);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* === 响应式 === */
@media(max-width:640px){
  nav{padding:0 12px;height:48px}.nav-link{padding:4px 8px;font-size:.75em}
  .stat-row{gap:8px}.stat-box{padding:12px 8px}.stat-num{font-size:1.5em}
  .page{padding:16px 12px}.func-grid{gap:8px}
}
body.child{font-size:20px}
body.child .word-btn{padding:12px 20px;font-size:1.05em}
body.child .btn{padding:14px 28px;font-size:1em}
</style>
</head>
<body>
<nav>
  <div class="nav-brand" onclick="go('dashboard')">英语小乐园</div>
  <div class="nav-links">
    <div class="nav-link active" data-p="dashboard" onclick="go('dashboard')">首页</div>
    <div class="nav-link" data-p="game" onclick="go('game')">闯关</div>
    <div class="nav-link" data-p="review" onclick="go('review')">复习</div>
    <div class="nav-link" data-p="import" onclick="go('import')">导入</div>
    <div class="nav-link" data-p="settings" onclick="go('settings')">设置</div>
    <div class="nav-link" data-p="achievements" onclick="go('achievements')">成就</div>
  </div>
  <div class="nav-profile" id="nav-profile" onclick="showUserModal()">选择用户</div>
</nav>
<div id="toast-box"></div>
<canvas id="confetti"></canvas>
<div id="page-dashboard" class="page active"></div>
<div id="page-game" class="page"></div>
<div id="page-review" class="page"></div>
<div id="page-import" class="page"></div>
<div id="page-settings" class="page"></div>
<div id="page-achievements" class="page"></div>
<div id="modal-box"></div>

<script>
// ====================================================================
// 英语小乐园 — 单HTML文件，零依赖，双击即用
// ====================================================================

// ==================== 多用户系统 ====================
const UserMgr = {
  getAll(){ return JSON.parse(localStorage.getItem('users')||'[]'); },
  saveAll(u){ localStorage.setItem('users', JSON.stringify(u)); },
  getActive(){ return localStorage.getItem('activeUser')||null; },
  setActive(id){ localStorage.setItem('activeUser', id); },
  getCurrent(){ const id=this.getActive(); return this.getAll().find(p=>p.id===id)||null; },
  getData(userId){
    const key='data_'+userId;
    let d=localStorage.getItem(key);
    if(!d){
      d={progress:{learned:0,score:0,streak:0,lastDate:'',totalSentences:0,correctSentences:0},
         errorBook:[],srs:{},achievements:[],preferences:{mode:'child'},importedSentences:[]};
      localStorage.setItem(key,JSON.stringify(d));
    }
    return JSON.parse(localStorage.getItem(key));
  },
  saveData(userId,d){ localStorage.setItem('data_'+userId,JSON.stringify(d)); },
  create(name,role='child',avatar='C'){
    const users=this.getAll();
    if(users.find(u=>u.name===name)){return null;} // 重名拦截
    const id=Date.now().toString();
    users.push({id,name,role,avatar});
    this.saveAll(users);
    this.getData(id);
    this.setActive(id);
    return id;
  },
  remove(userId){
    this.saveAll(this.getAll().filter(u=>u.id!==userId));
    localStorage.removeItem('data_'+userId);
    if(this.getActive()===userId) this.setActive(null);
  },
  updateStreak(userId){
    const d=this.getData(userId);
    const today=new Date().toDateString();
    if(d.progress.lastDate===today) return d.progress.streak;
    const y=new Date(); y.setDate(y.getDate()-1);
    d.progress.streak = d.progress.lastDate===y.toDateString() ? d.progress.streak+1 : 1;
    d.progress.lastDate=today;
    this.saveData(userId,d);
    return d.progress.streak;
  }
};

// ==================== TTS 语音模块 ====================
const Speech = {
  _synth: window.speechSynthesis,
  _speaking: false,
  speak(text, rate=0.85){
    if(!this._synth) return;
    this._synth.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=rate; u.pitch=1;
    // 尝试选择英语女声
    const voices=this._synth.getVoices();
    const enVoice=voices.find(v=>v.lang.startsWith('en')&&v.name.includes('Female'))
      || voices.find(v=>v.lang.startsWith('en-US'))
      || voices.find(v=>v.lang.startsWith('en'));
    if(enVoice) u.voice=enVoice;
    this._speaking=true;
    u.onend=()=>{ this._speaking=false; };
    this._synth.speak(u);
  },
  stop(){ if(this._synth) this._synth.cancel(); this._speaking=false; },
  // 页面加载时预加载语音列表
  init(){ if(this._synth) this._synth.getVoices(); }
};
// 浏览器需要异步加载语音列表
if(window.speechSynthesis){
  speechSynthesis.onvoiceschanged=()=>Speech.init();
  Speech.init();
}

// ==================== 自然拼读引擎 ====================
const Phonics = {
  BLENDS:{ch:'tʃ',sh:'ʃ',th:'θ',ph:'f',ck:'k',ng:'ŋ',nk:'ŋk',
    bl:'b·l',cl:'k·l',fl:'f·l',gl:'g·l',pl:'p·l',sl:'s·l',
    br:'b·r',cr:'k·r',dr:'d·r',fr:'f·r',gr:'g·r',pr:'p·r',tr:'t·r',
    st:'s·t',sp:'s·p',sk:'s·k',sw:'s·w',tw:'t·w',str:'s·t·r',spl:'s·p·l',spr:'s·p·r'},
  VOWEL_TEAMS:{ai:'ā',ay:'ā',ea:'ē',ee:'ē',ie:'ī',oa:'ō',oo:'ū/ʊ',
    ou:'ou',ow:'ou',oi:'oi',oy:'oi',au:'ɔː',aw:'ɔː',ew:'yū',
    ue:'ū',ui:'ū',ei:'ā',ey:'ē',igh:'ī',eigh:'ā',ough:'ō'},
  SUFFIXES:{tion:'ʃən',sion:'ʒən',ture:'tʃər',ous:'əs',ful:'fəl',
    ing:'ɪŋ',ness:'nəs',ment:'mənt',ly:'li',er:'ər',est:'iest',
    ed:'d',es:'z',s:'z',ble:'bəl',ple:'pəl',dle:'dəl',tle:'təl'},
  WORD_MAP:{
    the:'ðə',a:'ə',an:'æn',is:'ɪz',are:'ɑː',was:'wɒz',were:'wɜː',
    have:'hæv',has:'hæz',do:'duː',does:'dʌz',said:'sed',eye:'aɪ',
    one:'wʌn',two:'tuː',three:'θriː',five:'faɪv',eight:'eɪt',
    right:'raɪt',light:'laɪt',night:'naɪt',know:'noʊ',knee:'niː',
    write:'raɪt',who:'huː',what:'wɒt',school:'skuːl',
    love:'lʌv',come:'kʌm',some:'sʌm',give:'gɪv',have:'hæv',
    are:'ɑː',were:'wɜː',where:'wɛr',there:'ðɛr',their:'ðɛr',
    here:'hɪr',my:'maɪ',your:'jʊr',our:'aʊr',his:'hɪz',her:'hɜː',
    you:'juː',she:'ʃiː',they:'ðeɪ',been:'bɪn',does:'dʌz',
    could:'kʊd',would:'wʊd',should:'ʃʊd',about:'əˈbaʊt',
    house:'haʊs',mouse:'maʊs',mouth:'maʊθ',south:'saʊθ',
    because:'bɪˈkɒz',people:'ˈpiːpəl',little:'ˈlɪtəl',
    water:'ˈwɔːtər',after:'ˈɑːftər',often:'ˈɒfən',
    every:'ˈevri',only:'ˈoʊnli',also:'ˈɔːlsoʊ',
  },
  breakdown(word){
    word=word.toLowerCase().trim();
    if(this.WORD_MAP[word]) return [{part:word,sound:this.WORD_MAP[word]}];
    const r=[]; let i=0;
    while(i<word.length){
      if(i>0){const s=word.substring(i);
        for(const[k,sv]of Object.entries(this.SUFFIXES)){if(s.startsWith(k)){r.push({part:k,sound:sv});i+=k.length;break;}}
        if(i>=word.length)continue;}
      const tri=word.substring(i,i+3);
      if(this.BLENDS[tri]){r.push({part:tri,sound:this.BLENDS[tri]});i+=3;continue;}
      const di=word.substring(i,i+2);
      if(this.BLENDS[di]){r.push({part:di,sound:this.BLENDS[di]});i+=2;continue;}
      if(this.VOWEL_TEAMS[di]){r.push({part:di,sound:this.VOWEL_TEAMS[di]});i+=2;continue;}
      const ch=word[i];
      if('aeiou'.includes(ch)){
        const n1=word[i+1]||'',n2=word[i+2]||'';
        const isLong=n1&&!'aeiou'.includes(n1)&&n2&&'aeiou'.includes(n2);
        const vm={a:isLong?'ā':'æ',e:isLong?'ē':'ɛ',i:isLong?'ī':'ɪ',o:isLong?'ō':'ɒ',u:isLong?'ū':'ʌ'};
        r.push({part:ch,sound:vm[ch]||ch});
      } else {
        const cm={b:'b',c:'k',d:'d',f:'f',g:'g',h:'h',j:'dʒ',k:'k',l:'l',m:'m',n:'n',p:'p',r:'r',s:'s',t:'t',v:'v',w:'w',x:'ks',y:'j',z:'z'};
        r.push({part:ch,sound:cm[ch]||ch});}
      i++;
    }
    return r;
  },
  display(word){
    return this.breakdown(word).map(p=>
      `<span class="phonics-chip"><span class="phonics-part">${p.part}</span><span class="phonics-sound">${p.sound}</span></span>`
    ).join('');
  },
  displayRow(words){
    return `<div class="phonics-row">${words.map(w=>this.display(w)).join('')}</div>`;
  }
};

// ==================== 内置句子数据库（500+句，20分类） ====================
const CATEGORIES={
  animals:{n:'动物'},colors:{n:'颜色'},numbers:{n:'数字'},food:{n:'食物'},
  family:{n:'家庭'},body:{n:'身体'},greetings:{n:'问候'},phrases:{n:'短语'},
  clothes:{n:'衣服'},school:{n:'学校'},nature:{n:'自然'},weather:{n:'天气'},
  shapes:{n:'形状'},toys:{n:'玩具'},sports:{n:'运动'},emotions:{n:'情绪'},
  house:{n:'家居'},transport:{n:'交通'},jobs:{n:'职业'},actions:{n:'动作'}
};

const SENTENCES=[
// 动物 (1-28)
{t:"I have a cat.",z:"我有一只猫。",d:1,level:1},{t:"The dog is cute.",z:"这只狗很可爱。",d:1,level:1},
{t:"I see a fish.",z:"我看到一条鱼。",d:1,level:1},{t:"The bird can fly.",z:"鸟能飞。",d:1,level:1},
{t:"I like rabbits.",z:"我喜欢兔子。",d:1,level:1},{t:"The duck is yellow.",z:"鸭子是黄色的。",d:1,level:1},
{t:"I have two cats.",z:"我有两只猫。",d:1,level:1},{t:"The bear is big.",z:"熊很大。",d:1,level:1},
{t:"I love my dog.",z:"我爱我的狗。",d:1,level:1},{t:"The monkey likes bananas.",z:"猴子喜欢香蕉。",d:2,level:1},
{t:"I can see three birds.",z:"我能看到三只鸟。",d:2,level:1},{t:"The elephant has a long nose.",z:"大象有一个长鼻子。",d:2,level:1},
{t:"My cat is sleeping.",z:"我的猫在睡觉。",d:2,level:1},{t:"We have a little dog.",z:"我们有一只小狗。",d:2,level:1},
{t:"The fish is in the water.",z:"鱼在水里。",d:2,level:1},{t:"Look at the big bear.",z:"看那只大熊。",d:2,level:1},

{t:"It is estimated that over one billion people worldwide lack access to basic sanitation facilities.",z:"据估计，全球超过十亿人无法获得基本的卫生设施。",d:3,level:3},
{t:"The students who participated in the survey agreed that social media had a negative impact on their self-esteem.",z:"参加调查的学生一致认为社交媒体对他们的自尊心有负面影响。",d:3,level:3},
{t:"The government should ensure that all citizens have equal access to quality education.",z:"政府应确保所有公民都能平等地获得优质教育。",d:3,level:3},
{t:"The migration crisis has been described as the greatest humanitarian challenge of our time.",z:"移民危机被描述为我们这个时代最伟大的人道主义挑战。",d:3,level:3},
{t:"If the wage gap is not addressed, economic inequality will continue to divide communities.",z:"如果不解决工资差距，经济不平等将继续分裂社区。",d:3,level:3},
{t:"The tradition that has been passed down for generations is now in danger of disappearing.",z:"这一代代传承的传统现在正面临消失的危险。",d:3,level:3},
{t:"The report concluded that people who live in rural areas have significantly less access to healthcare.",z:"报告得出结论，生活在农村地区的人获得医疗保健的机会明显更少。",d:3,level:3},
{t:"The organization that advocates for human rights has been working in the region for over twenty years.",z:"倡导人权的该组织已在该地区工作了二十多年。",d:3,level:3},
{t:"Many families that were separated during the conflict have now been reunited through the efforts of humanitarian workers.",z:"许多在冲突中被分离的家庭现在通过人道主义工作者的努力已经团聚。",d:3,level:3},
{t:"It is thought that access to clean water is one of the most fundamental human rights.",z:"人们认为获得干净的水是最基本的人权之一。",d:3,level:3},
{t:"The education program that was designed for disadvantaged youth has shown promising results.",z:"为弱势青年设计的教育项目已显示出有希望的成果。",d:3,level:3},
{t:"The elderly residents, who have lived in the neighborhood for decades, were devastated by the decision to demolish their homes.",z:"在该街区居住了几十年的老年居民对拆除他们家园的决定感到极为悲痛。",d:3,level:3},
{t:"If the minimum wage is raised, many low-income workers will be able to afford basic necessities.",z:"如果提高最低工资，许多低收入工人将能够负担基本生活必需品。",d:3,level:3},
{t:"The public consultation revealed that most residents supported the proposal to build a new park.",z:"公众咨询显示，大多数居民支持建设新公园的提议。",d:3,level:3},
{t:"The volunteers who helped rebuild the community center after the flood were recognized at a special ceremony.",z:"在洪水后帮助重建社区中心的志愿者在特别仪式上受到表彰。",d:3,level:3},
{t:"It has been observed that people who engage in regular community activities tend to be happier and healthier.",z:"人们观察到，经常参加社区活动的人往往更快乐、更健康。",d:3,level:3},
{t:"The child poverty rate has fallen by nearly fifteen percent over the past decade.",z:"在过去十年中，儿童贫困率下降了近百分之十五。",d:3,level:3},
{t:"The city council voted to allocate additional funds for affordable housing in low-income neighborhoods.",z:"市议会投票决定为低收入社区的经济适用房拨付额外资金。",d:3,level:3},
{t:"The cultural festival, which attracts visitors from around the world, has been held annually since 1995.",z:"自1995年以来每年举办的这一文化节吸引了来自世界各地的游客。",d:3,level:3},
{t:"If society does not do more to support young people, the consequences will be felt for generations to come.",z:"如果社会不更多地支持年轻人，其后果将影响未来几代人。",d:3,level:3},
{t:"The housing crisis, which has been building for years, finally reached a breaking point in 2023.",z:"酝酿多年的住房危机终于在2023年达到了临界点。",d:3,level:3},
{t:"The immigrants who settled in the new country faced many challenges, including language barriers and discrimination.",z:"在新国家定居的移民面临许多挑战，包括语言障碍和歧视。",d:3,level:3},
{t:"It was reported that over forty percent of the population lived below the national poverty line.",z:"据报道，超过百分之四十的人口生活在国家贫困线以下。",d:3,level:3},
{t:"The organization that provides free meals to the homeless depends entirely on donations from the public.",z:"为无家可归者提供免费餐食的组织完全依赖公众捐款。",d:3,level:3},
{t:"The awareness campaign about mental health has helped reduce the stigma associated with seeking help.",z:"关于心理健康的认识运动帮助减少了寻求帮助相关的污名。",d:3,level:3},
{t:"If public transportation is made more affordable, fewer people will need to rely on their own cars.",z:"如果公共交通变得更加实惠，更少的人将需要依赖私家车。",d:3,level:3},
{t:"The parents who attended the meeting expressed concern about the safety of the school playground.",z:"参加会议的家长对学校操场的安全表示担忧。",d:3,level:3},
{t:"It is believed that strong community ties play an important role in preventing crime.",z:"人们认为牢固的社区纽带在预防犯罪方面发挥着重要作用。",d:3,level:3},
{t:"The housing project that was completed last year provided homes for over three hundred families.",z:"去年完成的住房项目为三百多个家庭提供了住房。",d:3,level:3},
{t:"The number of people who rely on food banks has increased dramatically in recent years.",z:"近年来依赖食物银行的人数急剧增加。",d:3,level:3},
{t:"The youth program that was launched to reduce crime in the area has been a resounding success.",z:"为减少该地区犯罪而推出的青年项目取得了巨大成功。",d:3,level:3},
{t:"If governments prioritize social welfare, the overall well-being of the population will improve.",z:"如果政府优先考虑社会福利，人口的整体幸福感将提高。",d:3,level:3},
{t:"The neighborhood association that was formed to address local concerns now has over five hundred members.",z:"为解决当地问题而成立的社区协会现在拥有超过五百名成员。",d:3,level:3},
{t:"The woman who spoke at the event shared her experiences of growing up in poverty.",z:"在活动中演讲的女性分享了她在贫困中长大的经历。",d:3,level:3},
{t:"The report indicated that gender discrimination in the workplace is still prevalent in many industries.",z:"报告指出，工作场所中的性别歧视在许多行业仍然普遍存在。",d:3,level:3},
{t:"The public library that was renovated last year now offers free computer classes to adults.",z:"去年翻新的公共图书馆现在为成年人提供免费计算机课程。",d:3,level:3},
// ============ Lv.3 中级 Health ============
{t:"It is recommended that adults should engage in at least one hundred and fifty minutes of moderate exercise each week.",z:"建议成年人每周至少进行一百五十分钟的中等强度运动。",d:3,level:3},
{t:"The study, which was conducted over a period of ten years, involved more than fifty thousand participants.",z:"这项为期十年的研究涉及五万多名参与者。",d:3,level:3},
{t:"If people reduce their sugar intake, the risk of developing type two diabetes will be significantly lower.",z:"如果人们减少糖分摄入，患二型糖尿病的风险将显著降低。",d:3,level:3},
{t:"The hospital that was built in the rural area now serves as the primary healthcare facility for the community.",z:"建在农村地区的医院现在是该社区的主要医疗设施。",d:3,level:3},
{t:"The vaccine, which was developed by an international team of scientists, has been proven to be over ninety percent effective.",z:"由国际科学家团队开发的疫苗已被证明有效率超过百分之九十。",d:3,level:3},
{t:"Smokers who quit the habit before the age of forty can significantly reduce their risk of heart disease.",z:"在四十岁之前戒烟的吸烟者可以显著降低患心脏病的风险。",d:3,level:3},
{t:"The research showed that people who eat a balanced diet are less likely to develop chronic illnesses.",z:"研究表明，饮食均衡的人患慢性病的可能性较低。",d:3,level:3},
{t:"It is believed that regular physical activity can help prevent both mental and physical health problems.",z:"人们相信定期的体育活动可以帮助预防身心疾病。",d:3,level:3},
{t:"The healthcare system, which has been under enormous strain, is in urgent need of reform.",z:"一直承受巨大压力的医疗保健系统迫切需要改革。",d:3,level:3},
{t:"If the government increased funding for mental health services, more people would be able to receive treatment.",z:"如果政府增加对心理健康服务的资助，将有更多的人能够接受治疗。",d:3,level:3},
{t:"The report found that children who skip breakfast perform worse in school than those who eat regularly.",z:"报告发现，不吃早餐的孩子在学校的表现不如定期吃早餐的孩子。",d:3,level:3},
{t:"The doctor advised the patient to reduce her salt consumption in order to lower her blood pressure.",z:"医生建议病人减少盐分摄入量以降低血压。",d:3,level:3},
{t:"The illness, which was first detected in early 2020, has affected millions of people worldwide.",z:"这种于2020年初首次发现的疾病已影响了全球数百万人。",d:3,level:3},
{t:"It is estimated that over two billion people worldwide do not get enough vitamins in their diet.",z:"据估计，全球超过二十亿人的饮食中缺乏足够的维生素。",d:3,level:3},
{t:"People who suffer from chronic stress are more likely to experience sleep problems and fatigue.",z:"遭受慢性压力的人更有可能出现睡眠问题和疲劳。",d:3,level:3},
{t:"The nursing staff, who worked around the clock during the crisis, were given a special commendation.",z:"在危机期间日夜工作的护理人员获得了特别嘉奖。",d:3,level:3},
{t:"If the current obesity trends continue, it is predicted that over half the population will be overweight by 2035.",z:"如果当前的肥胖趋势持续下去，预计到2035年将有超过一半的人口超重。",d:3,level:3},
{t:"The mental health awareness campaign was launched to encourage people to seek help without feeling ashamed.",z:"心理健康意识运动的发起是为了鼓励人们在不感到羞耻的情况下寻求帮助。",d:3,level:3},
{t:"The drug, which had been tested in several clinical trials, was finally approved for public use.",z:"已在多项临床试验中测试过的药物最终获批供公众使用。",d:3,level:3},
{t:"It is thought that drinking green tea regularly can have a positive effect on cardiovascular health.",z:"人们认为经常喝绿茶对心血管健康有积极影响。",d:3,level:3},
{t:"The nurses who volunteered to work in the disaster zone were praised for their dedication and professionalism.",z:"自愿到灾区工作的护士因其奉献精神和专业素养受到赞扬。",d:3,level:3},
{t:"The study revealed that people who live near parks are generally in better health than those who do not.",z:"研究表明，住在公园附近的人通常比不住在公园附近的人更健康。",d:3,level:3},
{t:"If patients are given more information about their conditions, they are more likely to follow treatment plans.",z:"如果患者获得关于其病情的更多信息，他们更有可能遵循治疗计划。",d:3,level:3},
{t:"The epidemic, which was initially contained in a few provinces, eventually spread across the entire country.",z:"最初被控制在几个省份的流行病最终蔓延到了整个国家。",d:3,level:3},
{t:"It has been found that people who exercise regularly have stronger immune systems than those who are sedentary.",z:"研究发现，经常锻炼的人比久坐不动的人免疫系统更强。",d:3,level:3},
{t:"The hospital introduced a new system that allows patients to book appointments online.",z:"医院引入了一种新系统，允许患者在线预约。",d:3,level:3},
{t:"The children who participated in the study were found to have lower levels of physical fitness than their parents did at the same age.",z:"研究发现，参与研究的孩子的身体素质水平低于他们父母同龄时的水平。",d:3,level:3},
{t:"If the healthcare budget is not increased, many hospitals will struggle to provide adequate care.",z:"如果医疗预算不增加，许多医院将难以提供充分的医疗服务。",d:3,level:3},
{t:"The medication, which is taken once daily, has been shown to reduce symptoms by up to seventy percent.",z:"这种每天服用一次的药物已被证明可将症状减轻多达百分之七十。",d:3,level:3},
{t:"It is widely recognized that mental health is just as important as physical health.",z:"人们普遍认识到心理健康与身体健康同等重要。",d:3,level:3},
{t:"The medical team that was sent to the disaster area treated over five hundred patients in the first week.",z:"派往灾区的医疗队在第一周治疗了五百多名患者。",d:3,level:3},
{t:"The research suggested that people who eat more vegetables are less likely to develop certain types of cancer.",z:"研究表明，吃更多蔬菜的人患某些类型癌症的可能性较低。",d:3,level:3},
{t:"If people maintained a healthy weight, the burden on the healthcare system would be greatly reduced.",z:"如果人们保持健康体重，医疗系统的负担将大大减轻。",d:3,level:3},
{t:"The elderly patients who were treated at the clinic expressed their gratitude for the compassionate care they received.",z:"在诊所接受治疗的老年患者对他们受到的关怀表达了感激之情。",d:3,level:3},
{t:"The report indicated that nearly one in three adults experiences some form of anxiety disorder at some point in their lives.",z:"报告显示，近三分之一的成年人在一生中某个时候会经历某种形式的焦虑症。",d:3,level:3},
{t:"The food safety regulations that were introduced last year have improved the quality of school meals.",z:"去年推出的食品安全法规提高了学校餐饮的质量。",d:3,level:3},
{t:"It was reported that a significant number of healthcare workers were experiencing burnout after two years of the pandemic.",z:"据报道，在疫情两年后，大量医疗工作者正在经历职业倦怠。",d:3,level:3},
{t:"If children are taught about nutrition at an early age, they are more likely to develop healthy eating habits.",z:"如果从小教孩子营养知识，他们更有可能养成健康的饮食习惯。",d:3,level:3},
{t:"The hospital, which is the largest in the state, treats patients from all over the region.",z:"这家全州最大的医院收治来自该地区的所有患者。",d:3,level:3},
{t:"It is estimated that stress-related illnesses cost the economy billions of dollars each year.",z:"据估计，与压力相关的疾病每年给经济造成数十亿美元的损失。",d:3,level:3},
{t:"The volunteers who organized the free health screening helped identify several undiagnosed conditions.",z:"组织免费健康筛查的志愿者帮助发现了几种未诊断的疾病。",d:3,level:3},
{t:"The scientists who led the research said that the findings could lead to new treatments for Alzheimer's disease.",z:"领导该研究的科学家表示，这些发现可能为阿尔茨海默病带来新的治疗方法。",d:3,level:3},
{t:"If more resources are allocated to preventive care, hospitals will be able to focus on treating serious illnesses.",z:"如果更多的资源被分配到预防性护理，医院将能够专注于治疗严重疾病。",d:3,level:3},
{t:"The pharmaceutical company that developed the vaccine was accused of putting profits before patient safety.",z:"开发该疫苗的制药公司被指控将利润置于患者安全之上。",d:3,level:3},
{t:"The doctor explained to the patient that the surgery would need to be performed within the next two weeks.",z:"医生向病人解释说手术需要在接下来的两周内进行。",d:3,level:3},
{t:"It is widely believed that a good night's sleep is essential for maintaining good health.",z:"人们普遍认为，良好的夜间睡眠对于保持健康至关重要。",d:3,level:3},
{t:"The health campaign that was launched to promote handwashing during the pandemic has been credited with reducing the spread of disease.",z:"为在疫情期间推广洗手而发起的健康运动被认为是减少疾病传播的功劳。",d:3,level:3},
{t:"The patients who received the new treatment reported significant improvements in their quality of life.",z:"接受新治疗的患者报告他们的生活质量有显著改善。",d:3,level:3},
{t:"If the current trends in childhood obesity continue, future generations will face even greater health challenges.",z:"如果当前儿童肥胖趋势持续下去，后代将面临更大的健康挑战。",d:3,level:3},
{t:"The nutritionist who consulted with the school recommended increasing the amount of fresh fruit in the menu.",z:"为学校提供咨询的营养师建议增加菜单中新鲜水果的份量。",d:3,level:3},
// ============ Lv.3 中级 Environment ============
{t:"The Amazon rainforest, which is often called the lungs of the planet, has lost approximately twenty percent of its area in the past fifty years.",z:"常被称为地球之肺的亚马逊雨林在过去五十年中已经失去了大约百分之二十的面积。",d:3,level:3},
{t:"If carbon emissions are not reduced significantly, global temperatures could rise by more than two degrees Celsius.",z:"如果不大幅减少碳排放，全球气温可能上升超过两摄氏度。",d:3,level:3},
{t:"The species that once inhabited this region have been driven to extinction by habitat destruction.",z:"曾经栖息在该地区的物种已因栖息地破坏而灭绝。",d:3,level:3},
{t:"It is estimated that over eight million tons of plastic waste enter the ocean every single year.",z:"据估计，每年有超过八百万吨塑料废物进入海洋。",d:3,level:3},
{t:"The conservation program that was launched to protect endangered animals has helped increase the population of several species.",z:"为保护濒危动物而启动的保护计划已帮助增加了几个物种的数量。",d:3,level:3},
{t:"The glacier, which has been monitored by scientists for decades, has shrunk by nearly forty percent.",z:"科学家们监测了几十年的冰川已经缩小了近百分之四十。",d:3,level:3},
{t:"If people continue to use single-use plastics, the amount of waste in the ocean will triple by 2040.",z:"如果人们继续使用一次性塑料，到2040年海洋中的废物将增加两倍。",d:3,level:3},
{t:"The report showed that air pollution in major cities has reached levels that are dangerous to human health.",z:"报告显示，主要城市的空气污染已达到对人类健康危险的水平。",d:3,level:3},
{t:"The electric vehicles that are being developed by the car manufacturer produce zero tailpipe emissions.",z:"该汽车制造商正在开发的电动汽车不产生任何尾气排放。",d:3,level:3},
{t:"It is widely acknowledged that climate change is one of the most pressing issues facing humanity today.",z:"人们普遍认为气候变化是当今人类面临的最紧迫的问题之一。",d:3,level:3},
{t:"The forest that was destroyed by the wildfire will take decades to fully recover.",z:"被野火摧毁的森林需要几十年才能完全恢复。",d:3,level:3},
{t:"If governments invest in renewable energy sources, the dependence on fossil fuels can be significantly reduced.",z:"如果政府投资于可再生能源，对化石燃料的依赖可以显著减少。",d:3,level:3},
{t:"The researchers who studied the coral reef found that over fifty percent of it had been damaged by rising sea temperatures.",z:"研究珊瑚礁的研究人员发现，超过百分之五十的珊瑚礁已被上升的海水温度破坏。",d:3,level:3},
{t:"The factory was fined for illegally dumping chemical waste into a nearby river.",z:"该工厂因非法向附近河流倾倒化学废物而被罚款。",d:3,level:3},
{t:"It is thought that deforestation is responsible for approximately ten percent of global greenhouse gas emissions.",z:"人们认为森林砍伐大约是全球温室气体排放的百分之十的来源。",d:3,level:3},
{t:"The wildlife sanctuary that was established in 2005 now provides a safe habitat for over three hundred species.",z:"2005年建立的野生动物保护区现在为三百多个物种提供安全的栖息地。",d:3,level:3},
{t:"If we do not act now, many of the world's most vulnerable communities will be displaced by rising sea levels.",z:"如果我们现在不采取行动，世界上许多最脆弱的社区将被上升的海平面所驱逐。",d:3,level:3},
{t:"The recycling initiative, which was introduced by the local council, has reduced household waste by thirty percent.",z:"由地方议会推出的回收计划已将家庭废物减少了百分之三十。",d:3,level:3},
{t:"The chemicals that are used in agriculture have been linked to the decline of bee populations worldwide.",z:"农业中使用的化学物质与全球蜜蜂数量的减少有关。",d:3,level:3},
{t:"It is estimated that one million species are currently at risk of extinction due to human activity.",z:"据估计，目前有一百万个物种因人类活动面临灭绝风险。",d:3,level:3},
{t:"The solar panels that were installed on the school roof are expected to generate enough energy to power the building.",z:"安装在学校屋顶上的太阳能电池板预计将产生足够的能量为建筑供电。",d:3,level:3},
{t:"If deforestation continues at the current rate, there will be no tropical rainforests left within a hundred years.",z:"如果砍伐以目前的速度继续下去，一百年内将不再有热带雨林。",d:3,level:3},
{t:"The ocean, which covers more than seventy percent of the Earth's surface, is under increasing threat from pollution.",z:"覆盖地球表面百分之七十以上的海洋正面临日益严重的污染威胁。",d:3,level:3},
{t:"The government introduced new regulations to limit the amount of carbon dioxide that factories can emit.",z:"政府推出了新法规来限制工厂可以排放的二氧化碳量。",d:3,level:3},
{t:"The natural disaster, which was caused by extreme weather, destroyed thousands of acres of farmland.",z:"由极端天气引起的自然灾害摧毁了数千英亩的农田。",d:3,level:3},
{t:"It is believed that switching to clean energy could create millions of new jobs around the world.",z:"人们相信转向清洁能源可以在全球创造数百万个新就业机会。",d:3,level:3},
{t:"The wetlands that serve as natural water filters have been drained to make way for development.",z:"作为天然水过滤器的湿地已被排干以腾出开发空间。",d:3,level:3},

{t:"The orchestra, which was founded over a century ago, continues to perform classical music to sold-out audiences.",z:"成立于一个世纪前的交响乐团继续为售罄的观众演奏古典音乐。",d:3,level:3},
{t:"The ancient temple, which was built during the sixth century, has been carefully restored by a team of experts.",z:"建于六世纪的这座古庙已被专家团队仔细修复。",d:3,level:3},
{t:"If schools included more cultural education in their curricula, students would develop a broader worldview.",z:"如果学校在课程中加入更多文化教育，学生将形成更广阔的世界观。",d:3,level:3},
{t:"The fashion designer, who is known for incorporating traditional patterns into modern clothing, has gained international recognition.",z:"以将传统图案融入现代服装而闻名的这位时装设计师已获得国际认可。",d:3,level:3},
{t:"The library that was opened in 1920 has been a center of cultural life in the community for over a hundred years.",z:"1920年开放的这个图书馆一百多年来一直是社区文化生活的中心。",d:3,level:3},
{t:"The dance company, which was established by a group of young artists, has performed in over thirty countries.",z:"由一群年轻艺术家建立的舞蹈团已在三十多个国家演出。",d:3,level:3},
{t:"It is widely believed that the arts are essential for personal development and emotional well-being.",z:"人们普遍认为艺术对于个人发展和情感健康至关重要。",d:3,level:3},
{t:"The film festival that was held in the coastal city attracted directors and actors from all over the world.",z:"在这个海滨城市举行的电影节吸引了来自世界各地的导演和演员。",d:3,level:3},
{t:"The language immersion program that was introduced in schools has helped students become fluent in a second language.",z:"在学校推出的语言沉浸式项目帮助学生精通了第二语言。",d:3,level:3},
{t:"The craftsmanship of the artisans who produce traditional textiles has been recognized as an intangible cultural heritage.",z:"生产传统纺织品的工匠的手工艺已被认定为非物质文化遗产。",d:3,level:3},
{t:"If more people appreciated the value of cultural diversity, there would be less prejudice and discrimination in society.",z:"如果有更多人欣赏文化多样性的价值，社会中的偏见和歧视将会减少。",d:3,level:3},
// ============ Lv.3 中级 Education ============
{t:"The university that was established in 1850 is one of the oldest and most prestigious institutions in the country.",z:"成立于1850年的这所大学是该国最古老和最负盛名的学府之一。",d:3,level:3},
{t:"Students who have access to quality early childhood education tend to perform better in later years.",z:"有机会接受优质幼儿教育的学生在以后的年代表现更好。",d:3,level:3},
{t:"The government announced that it would increase funding for schools in disadvantaged areas.",z:"政府宣布将增加对贫困地区学校的资金投入。",d:3,level:3},
{t:"If more resources are allocated to teacher training, the quality of education will improve significantly.",z:"如果更多的资源被分配到教师培训，教育质量将显著提高。",d:3,level:3},
{t:"The curriculum, which was redesigned last year, now includes more emphasis on critical thinking and creativity.",z:"去年重新设计的课程现在更加强调批判性思维和创造力。",d:3,level:3},
{t:"The research showed that students who study abroad gain valuable skills that benefit them in their careers.",z:"研究表明，在国外学习的学生获得的宝贵技能对他们的职业生涯有益。",d:3,level:3},
{t:"The teacher who was nominated for the national award has been praised for her innovative teaching methods.",z:"被提名国家奖项的这位老师因其创新的教学方法而受到赞扬。",d:3,level:3},
{t:"It is estimated that over two hundred sixty million children worldwide do not have access to primary education.",z:"据估计，全球超过两亿六千万儿童无法接受初等教育。",d:3,level:3},
{t:"The online learning platform that was launched during the pandemic has been used by over fifty million students.",z:"疫情期间推出的在线学习平台已被超过五千万学生使用。",d:3,level:3},
{t:"If students are encouraged to ask questions and think independently, they will develop stronger problem-solving skills.",z:"如果鼓励学生提问和独立思考，他们将发展出更强的解决问题的能力。",d:3,level:3},
{t:"The school that was built in the remote village has given hundreds of children their first opportunity to receive formal education.",z:"建在偏远村庄的这所学校给了数百名儿童第一次接受正规教育的机会。",d:3,level:3},
{t:"The scholarship program, which was established by the university, has helped over a thousand students pursue their studies.",z:"由大学设立的奖学金项目已帮助一千多名学生继续学业。",d:3,level:3},
{t:"It is widely recognized that bilingual education can enhance children's cognitive development.",z:"人们普遍认识到双语教育可以增强儿童的认知发展。",d:3,level:3},
{t:"The teachers who attended the professional development workshop reported that it was extremely beneficial.",z:"参加专业发展研讨会的老师报告说它非常有益。",d:3,level:3},
{t:"If the dropout rate continues to fall, more young people will have the opportunity to complete their education.",z:"如果辍学率继续下降，更多的年轻人将有机会完成学业。",d:3,level:3},
{t:"The university, which has a student body of over thirty thousand, offers a wide range of undergraduate and postgraduate programs.",z:"拥有三万多学生的这所大学提供广泛的本科和研究生课程。",d:3,level:3},
{t:"It is thought that a well-rounded education should include not only academic subjects but also arts and physical education.",z:"人们认为全面的教育不仅应包括学术科目，还应包括艺术和体育。",d:3,level:3},
{t:"The textbook that was written by the professor has become required reading in universities across the country.",z:"由这位教授编写的教科书已成为全国大学的必读教材。",d:3,level:3},
{t:"The education system, which has undergone significant reforms, is now more inclusive and accessible than ever before.",z:"经历了重大改革的教育系统现在比以往任何时候都更具包容性和可及性。",d:3,level:3},
{t:"If parents are more involved in their children's education, academic performance tends to improve.",z:"如果家长更多地参与孩子的教育，学业成绩往往会提高。",d:3,level:3},
{t:"The laboratory where the students conduct their experiments is equipped with the latest technology.",z:"学生们进行实验的实验室配备了最新的技术。",d:3,level:3},
{t:"The exchange program that was organized between the two schools has fostered cultural understanding among students.",z:"两所学校之间组织的交流项目促进了学生之间的文化理解。",d:3,level:3},
{t:"It was reported that fewer students were choosing to study science and engineering subjects at university.",z:"据报道越来越少的学生选择在大学学习科学和工程学科。",d:3,level:3},
{t:"The graduation ceremony, which was attended by the families of all the students, was a memorable occasion.",z:"所有学生家属参加的毕业典礼是一个难忘的场合。",d:3,level:3},
{t:"If technology is integrated effectively into the classroom, it can enhance the learning experience for students.",z:"如果技术有效地融入课堂，它可以增强学生的学习体验。",d:3,level:3},
{t:"The research found that students who participate in extracurricular activities tend to have higher self-confidence.",z:"研究发现参加课外活动的学生往往有更高的自信心。",d:3,level:3},
{t:"The library, which houses over a million books and digital resources, is open to students twenty-four hours a day.",z:"拥有超过一百万册书籍和数字资源的图书馆每天二十四小时向学生开放。",d:3,level:3},
{t:"The professor who has been teaching at the university for over thirty years is retiring at the end of this semester.",z:"在这所大学任教三十多年的教授将在本学期末退休。",d:3,level:3},
{t:"It is widely believed that education is the most effective tool for reducing poverty and inequality.",z:"人们普遍认为教育是减少贫困和不平等的最有效工具。",d:3,level:3},
{t:"The scholarship, which covers all tuition fees, was awarded to the top fifty students in the country.",z:"涵盖所有学费的奖学金被授予了全国前五十名学生。",d:3,level:3},
{t:"If schools invest in mental health resources, students will be better able to cope with academic pressures.",z:"如果学校投资于心理健康资源，学生将能更好地应对学业压力。",d:3,level:3},
{t:"The research paper, which was published in a leading journal, has contributed significantly to the field of education.",z:"发表在顶级期刊上的这篇研究论文对该教育领域做出了重要贡献。",d:3,level:3},
{t:"The preschool, which caters to children from low-income families, provides free meals and educational materials.",z:"为低收入家庭儿童服务的幼儿园提供免费餐食和教育材料。",d:3,level:3},
{t:"It is estimated that teachers spend over five hundred hours each year planning lessons and grading assignments.",z:"据估计教师每年花超过五百个小时备课和批改作业。",d:3,level:3},
{t:"The school that pioneered the project-based learning approach has seen a dramatic improvement in student engagement.",z:"率先采用项目式学习方法的学校在学生参与度方面取得了显著提高。",d:3,level:3},
{t:"The degree program that was launched in 2020 has already attracted students from over forty different countries.",z:"2020年推出的学位项目已经吸引了来自四十多个不同国家的学生。",d:3,level:3},
{t:"If the education budget is increased, schools will be able to hire more teachers and reduce class sizes.",z:"如果教育预算增加，学校将能够雇佣更多教师并缩小班级规模。",d:3,level:3},
{t:"The study revealed that children who read for pleasure perform better academically than those who do not.",z:"研究表明，为乐趣而阅读的孩子在学业上的表现优于不阅读的孩子。",d:3,level:3},
{t:"The mentorship program that pairs experienced professionals with students has been a great success.",z:"将经验丰富的专业人士与学生配对的导师计划取得了巨大成功。",d:3,level:3},
{t:"It is thought that standardized testing does not accurately measure a student's true abilities and potential.",z:"人们认为标准化考试不能准确衡量学生的真实能力和潜力。",d:3,level:3},
{t:"The vocational training program has helped thousands of young people find employment in skilled trades.",z:"职业培训项目已帮助数千名年轻人在技术行业找到就业机会。",d:3,level:3},
{t:"The classroom that was redesigned with flexible seating arrangements has created a more comfortable learning environment.",z:"用灵活座位安排重新设计的教室创造了更舒适的学习环境。",d:3,level:3},
{t:"If schools provide more support for students with learning difficulties, dropout rates will be significantly reduced.",z:"如果学校为有学习困难的学生提供更多支持，辍学率将显著降低。",d:3,level:3},
{t:"The international school, which follows a globally recognized curriculum, has students from over thirty nationalities.",z:"遵循全球认可课程的这所国际学校有来自三十多个国家的学生。",d:3,level:3},
{t:"It is widely acknowledged that early intervention is key to supporting children with special educational needs.",z:"人们普遍认为早期干预是支持有特殊教育需求儿童的关键。",d:3,level:3},
{t:"The education minister said that new measures would be introduced to improve literacy rates among young people.",z:"教育部长表示将采取新措施提高年轻人的识字率。",d:3,level:3},
{t:"The research, which involved over ten thousand students across the country, highlighted the importance of early reading.",z:"这项涉及全国一万多名学生的研究强调了早期阅读的重要性。",d:3,level:3},
{t:"If students are taught to think critically from a young age, they will be better prepared for the challenges of the future.",z:"如果从小教学生批判性思考，他们将更好地为未来的挑战做好准备。",d:3,level:3},
{t:"The university's research center, which was established in 2012, has produced numerous groundbreaking studies.",z:"2012年成立的大学研究中心已经产生了许多开创性的研究成果。",d:3,level:3},
{t:"The classroom volunteers who help young children with reading have made a positive impact on their academic progress.",z:"帮助年幼孩子阅读的课堂志愿者对他们的学业进步产生了积极影响。",d:3,level:3},
// ============ Lv.4 中高级 Academic Writing ============
{t:"Had the researcher analyzed the data more thoroughly, the conclusions might have been far more compelling.",z:"如果研究者对数据分析得更彻底一些，结论可能会更有说服力。",d:3,level:4},
{t:"Not only does the literature review reveal gaps in prior research, but it also highlights the need for a revised methodology.",z:"文献综述不仅揭示了先前研究的空白，还强调了修订研究方法的必要性。",d:3,level:4},
{t:"It is the methodology that determines the validity of any empirical study.",z:"正是方法论决定了任何实证研究的有效性。",d:3,level:4},
{t:"The extent to which these findings can be generalized remains a subject of considerable debate.",z:"这些发现能在多大程度上被推广，仍然是一个备受争议的话题。",d:3,level:4},
{t:"Were it not for the limitations imposed by the sample size, the study would yield more robust results.",z:"如果不是因为样本量的限制，这项研究会产生更可靠的结果。",d:3,level:4},
{t:"The author contends that the prevailing theoretical framework is fundamentally flawed.",z:"作者认为目前流行的理论框架存在根本性的缺陷。",d:3,level:4},
{t:"Having considered multiple perspectives, the researchers arrived at a more nuanced interpretation.",z:"在考虑了多种视角之后，研究者们得出了更为细致的解释。",d:3,level:4},
{t:"What distinguishes this study from previous ones is its longitudinal approach to data collection.",z:"这项研究与以往研究的不同之处在于其纵向数据收集方法。",d:3,level:4},
{t:"The data strongly suggest that socioeconomic factors play a pivotal role in shaping educational outcomes.",z:"数据有力地表明，社会经济因素在塑造教育成果方面起着关键作用。",d:3,level:4},
{t:"Notwithstanding the methodological shortcomings, the paper makes a valuable contribution to the field.",z:"尽管存在方法上的不足，这篇论文仍对该领域做出了宝贵的贡献。",d:3,level:4},
{t:"The implications of these findings extend well beyond the immediate context of the study.",z:"这些研究发现的意义远远超出了该研究的直接背景。",d:3,level:4},
{t:"Seldom has such a comprehensive analysis been undertaken in this particular domain.",z:"在这一特定领域中，很少有人进行过如此全面的分析。",d:3,level:4},
{t:"The argument put forth by the author rests on several tenuous assumptions.",z:"作者提出的论点建立在几个脆弱的假设之上。",d:3,level:4},
{t:"It remains to be seen whether subsequent studies will corroborate these preliminary findings.",z:"后续研究是否会证实这些初步发现，仍有待观察。",d:3,level:4},
{t:"The methodology employed in this investigation has been widely criticized for its lack of rigor.",z:"本研究采用的方法因缺乏严谨性而受到广泛批评。",d:3,level:4},
{t:"Had the authors acknowledged these limitations explicitly, their conclusions would carry more weight.",z:"如果作者明确承认了这些局限性，他们的结论会更有分量。",d:3,level:4},
{t:"The theoretical underpinnings of this research are rooted in constructivist epistemology.",z:"这项研究的理论基础根植于建构主义认识论。",d:3,level:4},
{t:"Not until we examine the broader sociocultural context can we fully appreciate these findings.",z:"只有当我们审视更广泛的社会文化背景时，才能充分理解这些发现。",d:3,level:4},
{t:"It is worth noting that the sample was drawn exclusively from urban populations.",z:"值得注意的是，样本完全来自城市人口。",d:3,level:4},
{t:"The author fails to account for several confounding variables that may have influenced the outcomes.",z:"作者未能解释可能影响结果的几个混淆变量。",d:3,level:4},
{t:"By no means does the evidence support the sweeping generalizations made in the conclusion.",z:"证据绝不支持结论中那些笼统的概括。",d:3,level:4},
{t:"The coherence of the argument would have been strengthened had the author integrated more empirical evidence.",z:"如果作者整合了更多实证证据，论证的连贯性会更强。",d:3,level:4},
{t:"A closer examination of the source material reveals several discrepancies in the author's account.",z:"对原始材料的更仔细审查揭示了作者叙述中的几处矛盾。",d:3,level:4},
{t:"The paucity of longitudinal data in this field makes it difficult to draw definitive conclusions.",z:"该领域纵向数据的匮乏使得得出确切结论变得困难。",d:3,level:4},
{t:"So compelling is the evidence that even skeptics have been forced to reconsider their positions.",z:"证据如此令人信服，以至于连怀疑者都不得不重新考虑自己的立场。",d:3,level:4},
{t:"The author's reliance on secondary sources undermines the credibility of certain key claims.",z:"作者对二手资料的依赖削弱了某些关键论点的可信度。",d:3,level:4},
{t:"Should future research confirm these trends, the policy implications would be profound.",z:"如果未来的研究证实了这些趋势，其政策影响将是深远的。",d:3,level:4},
{t:"The methodology section fails to elucidate how the control group was selected.",z:"方法论部分未能阐明对照组是如何选出的。",d:3,level:4},
{t:"In light of these findings, it would be premature to dismiss the theory entirely.",z:"鉴于这些发现，完全摒弃这一理论还为时过早。",d:3,level:4},
{t:"The author attributes the decline in performance primarily to institutional factors.",z:"作者将绩效下降主要归因于制度因素。",d:3,level:4},
{t:"Not until the limitations of the study are addressed can its findings be considered authoritative.",z:"只有解决了研究的局限性，其发现才能被视为权威的。",d:3,level:4},
{t:"The rigor with which the peer review process was conducted has been questioned by several scholars.",z:"同行评审过程的严谨性受到了多位学者的质疑。",d:3,level:4},
{t:"It is the interplay between qualitative and quantitative methods that yields the most insightful results.",z:"正是定性与定量方法之间的相互作用才能产生最具洞察力的结果。",d:3,level:4},
{t:"The discourse surrounding this issue is far more complex than the author acknowledges.",z:"围绕这一问题的讨论远比作者所承认的要复杂。",d:3,level:4},
{t:"The absence of a control group renders the study's findings largely inconclusive.",z:"缺乏对照组使得该研究的结论在很大程度上不确定。",d:3,level:4},
{t:"Were the researchers to replicate this study with a larger sample, the results might differ considerably.",z:"如果研究者用更大的样本来重复这项研究，结果可能会大不相同。",d:3,level:4},
{t:"The citation practices employed throughout the paper are inconsistent at best.",z:"整篇论文采用的引用做法至少可以说是不一致的。",d:3,level:4},
{t:"What remains problematic is the lack of transparency in the data collection process.",z:"仍然存在问题的是数据收集过程缺乏透明度。",d:3,level:4},
{t:"The findings corroborate earlier research while simultaneously challenging certain entrenched assumptions.",z:"这些发现证实了早期的研究，同时又挑战了某些根深蒂固的假设。",d:3,level:4},
{t:"Nowhere in the paper does the author provide adequate justification for these methodological choices.",z:"作者在论文中没有为这些方法论选择提供充分的理由。",d:3,level:4},
{t:"The arguments presented herein are predicated on a series of contestable premises.",z:"本文提出的论点建立在一系列可争议的前提之上。",d:3,level:4},
{t:"This paper aims to bridge the gap between theoretical speculation and empirical verification.",z:"本文旨在弥合理论推测与实证验证之间的差距。",d:3,level:4},
{t:"The significance of this research lies not in its immediate applicability but in its conceptual contribution.",z:"这项研究的意义不在于其直接的适用性，而在于其概念上的贡献。",d:3,level:4},
{t:"A more balanced approach to the literature would have yielded a richer analysis.",z:"对文献采取更平衡的方法会产生更丰富的分析。",d:3,level:4},
{t:"The conclusions drawn from this study are necessarily tentative given the exploratory nature of the research.",z:"鉴于该研究的探索性质，从这项研究中得出的结论必然是暂时性的。",d:3,level:4},
{t:"Only by examining the underlying mechanisms can we hope to develop effective interventions.",z:"只有通过研究其底层机制，我们才有希望制定有效的干预措施。",d:3,level:4},
{t:"The theoretical framework adopted in this paper draws heavily on social constructionist perspectives.",z:"本文采用的理论框架大量借鉴了社会建构主义的视角。",d:3,level:4},
{t:"Much of the existing research on this topic has been conducted under controlled laboratory conditions.",z:"关于这一主题的大部分研究都是在受控的实验室条件下进行的。",d:3,level:4},
{t:"The author's selective use of evidence weakens an otherwise persuasive argument.",z:"作者有选择性地使用证据，削弱了一个原本令人信服的论点。",d:3,level:4},
{t:"The peer review process, while imperfect, remains the most effective mechanism for ensuring scholarly rigor.",z:"同行评审过程虽然不完美，但仍然是确保学术严谨性最有效的机制。",d:3,level:4},

// ============ Lv.4 中高级 Global Issues ============
{t:"Were the international community to act decisively, the devastating effects of climate change could still be mitigated.",z:"如果国际社会果断行动，气候变化的毁灭性影响仍然可以得到缓解。",d:3,level:4},
{t:"It is the poorest nations that bear the heaviest burden of environmental degradation.",z:"正是最贫穷的国家承受着环境恶化的最沉重负担。",d:3,level:4},
{t:"The widening gap between the affluent and the impoverished poses a serious threat to global stability.",z:"富裕阶层与贫困阶层之间日益扩大的差距对全球稳定构成了严重威胁。",d:3,level:4},
{t:"Not until wealthy nations honor their aid commitments can meaningful progress be made toward eradicating poverty.",z:"只有当富裕国家兑现其援助承诺，消除贫困方面才能取得有意义的进展。",d:3,level:4},
{t:"The refugee crisis has exposed the inadequacy of existing international humanitarian frameworks.",z:"难民危机暴露了现有人道主义国际框架的不足。",d:3,level:4},
{t:"So acute is the water shortage in certain regions that it has become a catalyst for armed conflict.",z:"某些地区的水资源短缺如此严重，以至于已成为武装冲突的催化剂。",d:3,level:4},
{t:"The global food supply chain is far more vulnerable to disruption than most people realize.",z:"全球食品供应链比大多数人所意识到的更容易受到干扰。",d:3,level:4},
{t:"The persistence of child labor is a stark reminder that economic growth alone does not guarantee social progress.",z:"童工现象的持续存在是一个鲜明的提醒：仅靠经济增长并不能保证社会进步。",d:3,level:4},
{t:"Not only does globalization create unprecedented economic opportunities, but it also exacerbates existing inequalities.",z:"全球化不仅创造了前所未有的经济机会，还加剧了现有的不平等。",d:3,level:4},
{t:"The biodiversity crisis demands immediate and coordinated action from governments worldwide.",z:"生物多样性危机要求世界各国政府立即采取协调行动。",d:3,level:4},
{t:"Should the current trajectory of carbon emissions continue unabated, the consequences for coastal cities will be catastrophic.",z:"如果当前的碳排放趋势继续下去，对沿海城市的后果将是灾难性的。",d:3,level:4},
{t:"The international response to humanitarian emergencies has been woefully inadequate.",z:"国际社会对人道主义紧急事件的应对措施远远不够。",d:3,level:4},
{t:"The Sustainable Development Goals represent an ambitious blueprint for addressing the world's most pressing challenges.",z:"可持续发展目标为解决世界最紧迫的挑战提供了一个雄心勃勃的蓝图。",d:3,level:4},
{t:"Had the Paris Agreement targets been met, global temperatures might have remained within manageable limits.",z:"如果达成了巴黎协定的目标，全球气温可能仍保持在可控范围内。",d:3,level:4},
{t:"The issue of food security is inextricably linked to the broader question of climate adaptation.",z:"粮食安全问题与气候适应这一更广泛的问题密不可分。",d:3,level:4},
{t:"Rarely has the world faced a challenge as multifaceted as the current migration crisis.",z:"世界很少面临像当前移民危机这样多层面的挑战。",d:3,level:4},
{t:"The exploitation of natural resources in developing countries often benefits multinational corporations at the expense of local communities.",z:"对发展中国家自然资源的开发往往以牺牲当地社区为代价来造福跨国公司。",d:3,level:4},
{t:"It is incumbent upon developed nations to take the lead in reducing greenhouse gas emissions.",z:"发达国家有责任在减少温室气体排放方面发挥带头作用。",d:3,level:4},
{t:"The effectiveness of international sanctions as a tool for promoting human rights remains highly contested.",z:"国际制裁作为促进人权工具的有效性仍存在极大争议。",d:3,level:4},
{t:"Without a concerted effort to address root causes, surface-level interventions will yield only temporary relief.",z:"如果不齐心协力解决根本原因，表面干预只能带来暂时的缓解。",d:3,level:4},
{t:"The disparity in healthcare access between urban and rural areas is one of the most pressing challenges facing developing nations.",z:"城乡之间医疗保健获取的差距是发展中国家面临的最紧迫挑战之一。",d:3,level:4},
{t:"The deforestation of tropical rainforests has far-reaching implications for global carbon cycles.",z:"热带雨林的砍伐对全球碳循环具有深远的影响。",d:3,level:4},
{t:"Were education more widely accessible, many of the world's socioeconomic problems would gradually diminish.",z:"如果教育更加普及，世界上的许多社会经济问题将逐渐减少。",d:3,level:4},
{t:"The growing prevalence of antimicrobial resistance threatens to undermine decades of medical progress.",z:"抗菌素耐药性的日益普遍威胁着数十年来的医学进步。",d:3,level:4},
{t:"Only through genuine multilateral cooperation can the international community hope to tackle transnational crime.",z:"只有通过真正的多边合作，国际社会才有希望应对跨国犯罪。",d:3,level:4},
{t:"The paradox of globalization is that it simultaneously connects and divides societies.",z:"全球化的悖论在于它同时连接和分裂了社会。",d:3,level:4},
{t:"The failure to invest in renewable energy infrastructure will have dire economic and environmental consequences.",z:"未能投资可再生能源基础设施将带来严重的经济和环境后果。",d:3,level:4},
{t:"Not only are developing nations disproportionately affected by climate change, but they also have the fewest resources to adapt.",z:"发展中国家不仅受到气候变化的不成比例影响，而且适应资源也最少。",d:3,level:4},
{t:"It is imperative that policymakers adopt a more holistic approach to tackling global poverty.",z:"决策者必须采取更全面的方法来解决全球贫困问题。",d:3,level:4},
{t:"The political will to address income inequality has been conspicuously absent in many industrialized nations.",z:"许多工业化国家在解决收入不平等问题上明显缺乏政治意愿。",d:3,level:4},
{t:"The human cost of armed conflict extends far beyond the immediate casualties of war.",z:"武装冲突的人力代价远远超出了战争的直接伤亡。",d:3,level:4},
{t:"The principle of climate justice demands that those most responsible for emissions bear the greatest responsibility for mitigation.",z:"气候正义原则要求对排放负有最大责任的国家承担最大的减缓责任。",d:3,level:4},
{t:"Global pandemics have laid bare the fragility of even the most advanced healthcare systems.",z:"全球大流行病暴露了即使是最先进的医疗保健体系的脆弱性。",d:3,level:4},
{t:"The issue of ocean pollution cannot be resolved by any single nation acting in isolation.",z:"海洋污染问题无法由任何单一国家单独行动来解决。",d:3,level:4},
{t:"Had the international community invested more heavily in disaster preparedness, the death toll from natural disasters would be significantly lower.",z:"如果国际社会在灾害预防方面投入更多，自然灾害造成的死亡人数将会显著降低。",d:3,level:4},
{t:"The proliferation of fast fashion has contributed enormously to textile waste and environmental degradation.",z:"快时尚的泛滥极大地加剧了纺织品浪费和环境退化。",d:3,level:4},
{t:"The global water crisis is projected to worsen considerably over the coming decades.",z:"全球水危机预计在未来几十年将显著恶化。",d:3,level:4},
{t:"What the developing world needs is not charity but equitable trade agreements.",z:"发展中国家需要的不是慈善，而是公平的贸易协议。",d:3,level:4},
{t:"The international framework for protecting refugees has been eroded by political expediency.",z:"保护难民的国际框架已被政治上的权宜之计所侵蚀。",d:3,level:4},
{t:"So interdependent are the world's economies that a financial crisis in one region can trigger a global recession.",z:"世界经济的相互依存程度如此之高，以至于一个地区的金融危机可以引发全球衰退。",d:3,level:4},
{t:"The challenge of sustainable development requires balancing economic growth with environmental stewardship.",z:"可持续发展的挑战要求在经济增长与环境管理之间取得平衡。",d:3,level:4},
{t:"It is the marginalized communities that suffer most acutely from the effects of environmental pollution.",z:"正是边缘化社区最受环境污染影响之苦。",d:3,level:4},
{t:"The ongoing depletion of freshwater reserves poses an existential threat to millions of people.",z:"淡水资源的持续枯竭对数百万人构成了生存威胁。",d:3,level:4},
{t:"Were developing countries granted greater representation in international financial institutions, global economic governance might be more equitable.",z:"如果给予发展中国家在国际金融机构中更大的代表权，全球经济治理可能会更加公平。",d:3,level:4},
{t:"The nexus between climate change and conflict is becoming increasingly well documented by researchers.",z:"气候变化与冲突之间的联系正越来越多地被研究者们记录下来。",d:3,level:4},
{t:"The global community must come to terms with the reality that business as usual is no longer tenable.",z:"国际社会必须接受这样一个现实：照旧行事已不再可行。",d:3,level:4},
{t:"The ethical obligations of wealthy nations toward climate refugees remain largely unfulfilled.",z:"富裕国家对气候难民的道德义务在很大程度上尚未兑现。",d:3,level:4},
{t:"Only by addressing systemic corruption can developing nations unlock their full economic potential.",z:"只有通过解决系统性腐败问题，发展中国家才能释放其全部经济潜力。",d:3,level:4},
{t:"The eradication of extreme poverty is not merely an economic objective but a moral imperative.",z:"消除极端贫困不仅是一个经济目标，更是一项道德义务。",d:3,level:4},
{t:"The unprecedented scale of urbanization presents both opportunities and formidable challenges.",z:"空前规模的城市化既带来了机遇，也带来了艰巨的挑战。",d:3,level:4},

// ============ Lv.4 中高级 Science ============
{t:"So rapid is the pace of technological advancement that scientific ethics often struggle to keep up.",z:"技术进步的速度如此之快，以至于科学伦理常常难以跟上。",d:3,level:4},
{t:"The discovery of exoplanets has fundamentally altered our understanding of the universe.",z:"系外行星的发现从根本上改变了我们对宇宙的理解。",d:3,level:4},
{t:"It is the interplay between genetic predisposition and environmental factors that determines most phenotypic traits.",z:"正是遗传倾向与环境因素之间的相互作用决定了大多数表型特征。",d:3,level:4},
{t:"The implications of CRISPR gene-editing technology extend far beyond the realm of medicine.",z:"CRISPR基因编辑技术的影响远远超出了医学领域。",d:3,level:4},
{t:"Not until the human genome was fully mapped could researchers begin to grasp the complexity of genetic diseases.",z:"只有在人类基因组被完整绘制之后，研究者们才能开始理解遗传疾病的复杂性。",d:3,level:4},
{t:"The accelerating loss of biodiversity is likely to have cascading effects on ecosystem services.",z:"生物多样性的加速丧失可能会对生态系统服务产生连锁效应。",d:3,level:4},
{t:"Were it not for the contributions of basic research, applied science would stagnate.",z:"如果不是基础研究的贡献，应用科学将会停滞不前。",d:3,level:4},
{t:"The phenomenon of antibiotic resistance is a stark illustration of natural selection in action.",z:"抗生素耐药性现象是自然选择发挥作用的鲜明例证。",d:3,level:4},
{t:"The relationship between gut microbiota and mental health has emerged as a promising area of investigation.",z:"肠道微生物群与心理健康之间的关系已成为一个前景广阔的研究领域。",d:3,level:4},
{t:"It has become increasingly apparent that climate models must account for feedback loops between oceans and the atmosphere.",z:"越来越明显的是，气候模型必须考虑海洋与大气之间的反馈循环。",d:3,level:4},
{t:"The quest for sustainable energy sources has led to remarkable breakthroughs in solar and wind technology.",z:"对可持续能源的追求在太阳能和风能技术方面取得了显著突破。",d:3,level:4},
{t:"The ethical implications of artificial intelligence in healthcare are far more nuanced than popular discourse suggests.",z:"人工智能在医疗保健中的伦理影响远比大众讨论所暗示的更为复杂。",d:3,level:4},
{t:"The evidence overwhelmingly suggests that human activity is the primary driver of contemporary climate change.",z:"压倒性的证据表明，人类活动是当代气候变化的主要驱动力。",d:3,level:4},
{t:"So intricate are neural networks that even the most advanced artificial intelligence can only approximate their function.",z:"神经网络如此复杂，以至于即使是最先进的人工智能也只能近似其功能。",d:3,level:4},
{t:"The development of quantum computing has the potential to revolutionize fields ranging from cryptography to drug discovery.",z:"量子计算的发展有潜力彻底改变从密码学到药物发现的各个领域。",d:3,level:4},
{t:"Had the scientific community responded more swiftly to emerging evidence, some of the worst effects of pollution could have been avoided.",z:"如果科学界对新出现的证据反应更迅速，污染的一些最严重影响本可以避免。",d:3,level:4},
{t:"The CRISPR-Cas9 system has opened up unprecedented possibilities for targeted genetic modification.",z:"CRISPR-Cas9系统为靶向基因修饰开辟了前所未有的可能性。",d:3,level:4},
{t:"The role of epigenetics in shaping disease susceptibility is only beginning to be fully understood.",z:"表观遗传学在塑造疾病易感性方面的作用才刚刚开始被充分理解。",d:3,level:4},
{t:"It is through rigorous peer review that the integrity of scientific research is maintained.",z:"正是通过严格的同行评审，科学研究的完整性才得以维护。",d:3,level:4},
{t:"The convergence of biology and information technology promises to transform personalized medicine.",z:"生物学与信息技术的融合有望变革个性化医疗。",d:3,level:4},
{t:"The long-term consequences of microplastic contamination in marine ecosystems are only beginning to emerge.",z:"微塑料污染对海洋生态系统的长期后果才刚刚开始显现。",d:3,level:4},
{t:"Not only does neuroscience deepen our understanding of the brain, but it also raises profound philosophical questions.",z:"神经科学不仅加深了我们对大脑的理解，还引发了深刻的哲学问题。",d:3,level:4},
{t:"The application of machine learning algorithms to genomic data has accelerated the identification of disease biomarkers.",z:"将机器学习算法应用于基因组数据加速了疾病生物标志物的鉴定。",d:3,level:4},
{t:"The accelerating rate of species extinction is a direct consequence of human-induced habitat destruction.",z:"物种灭绝速度的加快是人类造成的栖息地破坏的直接后果。",d:3,level:4},
{t:"The replication crisis has forced the scientific community to reexamine fundamental assumptions about research methodology.",z:"可重复性危机迫使科学界重新审视关于研究方法论的基本假设。",d:3,level:4},
{t:"It is now widely acknowledged that interdisciplinary collaboration is essential for tackling complex scientific problems.",z:"现在人们普遍承认，跨学科合作对于解决复杂的科学问题至关重要。",d:3,level:4},
{t:"The potential of stem cell therapy to regenerate damaged tissue has generated enormous excitement in the medical community.",z:"干细胞疗法再生受损组织的潜力在医学界引起了巨大兴奋。",d:3,level:4},
{t:"So complex are the interactions within ecosystems that even minor disruptions can have far-reaching consequences.",z:"生态系统内部的相互作用如此复杂，以至于即使是微小的干扰也可能产生深远的后果。",d:3,level:4},
{t:"The ability of mRNA vaccines to be rapidly developed and deployed represents a paradigm shift in immunology.",z:"mRNA疫苗能够被快速开发和部署的能力代表了免疫学的范式转变。",d:3,level:4},
{t:"The ethical boundaries of human experimentation have been a subject of debate since the Nuremberg trials.",z:"人体实验的伦理边界自纽伦堡审判以来一直是辩论的主题。",d:3,level:4},
{t:"Were scientists to prioritize open-access publishing, the dissemination of knowledge would be vastly more equitable.",z:"如果科学家优先考虑开放获取出版，知识的传播将会更加公平。",d:3,level:4},
{t:"The discovery of extremophiles has expanded our notion of where life can potentially exist.",z:"极端微生物的发现扩展了我们对生命可能存在于何处的认知。",d:3,level:4},
{t:"The intersection of neuroscience and artificial intelligence has yielded insights into both human cognition and machine learning.",z:"神经科学与人工智能的交叉领域为人类认知和机器学习都带来了洞见。",d:3,level:4},
{t:"The unprecedented speed of vaccine development during the COVID-19 pandemic demonstrated the power of collaborative science.",z:"COVID-19大流行期间疫苗开发的空前速度展示了协作科学的力量。",d:3,level:4},
{t:"Only by embracing uncertainty can scientists maintain the intellectual honesty that is the hallmark of good research.",z:"只有拥抱不确定性，科学家才能保持作为优秀研究标志的学术诚实。",d:3,level:4},
{t:"The phenomenon of horizontal gene transfer challenges traditional assumptions about the tree of life.",z:"水平基因转移现象挑战了关于生命之树的传统假设。",d:3,level:4},
{t:"So profound are the implications of dark matter research that it may ultimately reshape our understanding of physics.",z:"暗物质研究的意义如此深远，以至于它可能最终重塑我们对物理学的理解。",d:3,level:4},
{t:"The development of lab-grown meat has the potential to dramatically reduce the environmental impact of food production.",z:"实验室培育肉的发展有可能显著减少食品生产对环境的影响。",d:3,level:4},
{t:"The scientific method, for all its limitations, remains the most reliable framework for acquiring knowledge.",z:"科学方法尽管有其局限性，仍然是获取知识最可靠的框架。",d:3,level:4},
{t:"It is the responsibility of scientists to communicate their findings clearly to the public.",z:"科学家有责任向公众清晰地传达他们的发现。",d:3,level:4},
{t:"The ability to edit the germline of human embryos raises profound ethical questions about the future of our species.",z:"编辑人类胚胎生殖细胞系的能力引发了关于我们物种未来的深刻伦理问题。",d:3,level:4},
{t:"The complexity of the human microbiome suggests that treating it as a single entity is overly simplistic.",z:"人类微生物组的复杂性表明，将其视为单一实体过于简单化。",d:3,level:4},
{t:"Not until climate scientists incorporated ocean acidification into their models did the full picture become clear.",z:"直到气候科学家将海洋酸化纳入他们的模型，全貌才变得清晰。",d:3,level:4},
{t:"The application of nanotechnology in medicine holds promise for targeted drug delivery and diagnostics.",z:"纳米技术在医学中的应用为靶向药物输送和诊断带来了希望。",d:3,level:4},
{t:"The increasing sophistication of brain-computer interfaces blurs the boundary between human and machine.",z:"脑机接口日益精密化模糊了人类与机器之间的界限。",d:3,level:4},
{t:"The challenge of nuclear fusion has defied scientists for decades, yet recent breakthroughs offer renewed hope.",z:"核聚变的挑战让科学家们几十年来束手无策，然而最近的突破带来了新的希望。",d:3,level:4},
{t:"So much of modern medicine depends on antibiotics that a post-antibiotic era would represent a catastrophic regression.",z:"现代医学在很大程度上依赖抗生素，以至于后抗生素时代将代表灾难性的倒退。",d:3,level:4},
{t:"The exploration of the deep ocean has revealed ecosystems that challenge our fundamental assumptions about biology.",z:"对深海的探索揭示了挑战我们对生物学基本假设的生态系统。",d:3,level:4},
{t:"Only by adopting a precautionary approach can society responsibly manage the risks of emerging technologies.",z:"只有采取预防性方法，社会才能负责任地管理新兴技术的风险。",d:3,level:4},
{t:"The remarkable plasticity of the human brain demonstrates that neural pathways can be restructured throughout life.",z:"人类大脑非凡的可塑性表明，神经通路可以在一生中被重塑。",d:3,level:4},

// ============ Lv.4 中高级 Law & Rights ============
{t:"The rule of law is predicated on the principle that no individual, however powerful, is above legal accountability.",z:"法治建立在这样一个原则之上：无论多么强大的个人都不能凌驾于法律责任之上。",d:3,level:4},
{t:"It is the judiciary that serves as the ultimate guardian of constitutional rights.",z:"正是司法部门充当了宪法权利的最终守护者。",d:3,level:4},
{t:"Were due process not rigorously enforced, the very foundations of a democratic society would crumble.",z:"如果正当程序没有被严格执行，民主社会的根基将会崩塌。",d:3,level:4},
{t:"The tension between national security and individual liberty is one of the most enduring dilemmas in constitutional law.",z:"国家安全与个人自由之间的张力是宪法学中最持久的困境之一。",d:3,level:4},
{t:"Not until the landmark ruling of Brown v. Board of Education was the doctrine of separate but equal legally dismantled.",z:"直到布朗诉教育委员会案的里程碑式裁决，隔离但平等的学说才被从法律上推翻。",d:3,level:4},
{t:"The presumption of innocence is a cornerstone of criminal justice systems worldwide.",z:"无罪推定是全球刑事司法体系的基石。",d:3,level:4},
{t:"So fundamental is the right to privacy that any encroachment upon it must be subjected to strict judicial scrutiny.",z:"隐私权是如此基本，以至于任何对它的侵犯都必须经过严格的司法审查。",d:3,level:4},
{t:"The principle of habeas corpus has long been regarded as a safeguard against arbitrary detention.",z:"人身保护令原则长期以来被视为防止任意拘留的保障。",d:3,level:4},
{t:"It is incumbent upon the legal profession to ensure that justice is not merely an abstract ideal but a lived reality.",z:"法律界有责任确保正义不仅是一个抽象的理想，而且是一个活生生的现实。",d:3,level:4},
{t:"The increasing use of artificial intelligence in legal decision-making has raised serious concerns about algorithmic bias.",z:"人工智能在法律决策中日益增多的使用引发了关于算法偏见的严重关切。",d:3,level:4},
{t:"International humanitarian law places explicit prohibitions on the targeting of civilian populations during armed conflict.",z:"国际人道法明确禁止在武装冲突中以平民人口为目标。",d:3,level:4},
{t:"The doctrine of proportionality demands that any restriction on fundamental rights must be no more than is strictly necessary.",z:"比例原则要求对基本权利的任何限制不得超过严格必要的程度。",d:3,level:4},
{t:"Not only does the constitution guarantee freedom of expression, but it also imposes limits to prevent the abuse of that right.",z:"宪法不仅保障言论自由，还施加限制以防止滥用该权利。",d:3,level:4},
{t:"The enforcement of intellectual property rights in the digital age presents unprecedented legal challenges.",z:"在数字时代执行知识产权带来了前所未有的法律挑战。",d:3,level:4},
{t:"So complex are international trade regulations that compliance requires specialized legal expertise.",z:"国际贸易法规如此复杂，以至于合规需要专业的法律知识。",d:3,level:4},
{t:"The principle of non-refoulement prohibits the forced return of refugees to countries where they face persecution.",z:"不驱回原则禁止将难民强制遣返到他们面临迫害的国家。",d:3,level:4},
{t:"The legitimacy of any legal system ultimately depends on the public's trust in its fairness and impartiality.",z:"任何法律体系的合法性最终取决于公众对其公正性和公平性的信任。",d:3,level:4},
{t:"The application of restorative justice principles has shown promise in reducing recidivism among juvenile offenders.",z:"恢复性司法原则的应用在减少青少年犯罪者再犯率方面显示出了希望。",d:3,level:4},
{t:"Were anti-discrimination legislation more rigorously enforced, workplace equality would be far closer to reality.",z:"如果反歧视法律得到更严格的执行，职场平等将更接近现实。",d:3,level:4},
{t:"The concept of corporate legal responsibility has expanded dramatically in recent decades.",z:"企业法律责任的概念在近几十年来已大幅扩展。",d:3,level:4},
{t:"The tension between free speech and hate speech regulation continues to divide legal scholars.",z:"言论自由与仇恨言论监管之间的紧张关系继续使法律学者产生分歧。",d:3,level:4},
{t:"Only by holding corporations legally accountable for environmental damage can meaningful change be achieved.",z:"只有让企业对环境损害承担法律责任，才能实现有意义的改变。",d:3,level:4},
{t:"The evolution of privacy law in response to digital surveillance represents one of the great legal challenges of our time.",z:"隐私法在数字监控面前的演变代表了我们这个时代最重大的法律挑战之一。",d:3,level:4},
{t:"The right to a fair trial is universally recognized as a fundamental principle of international human rights law.",z:"获得公正审判的权利被普遍认为是国际人权法的基本原则。",d:3,level:4},
{t:"The application of extraterritorial jurisdiction raises complex questions about sovereignty and legal authority.",z:"域外管辖权的适用引发了关于主权和法律权力的复杂问题。",d:3,level:4},
{t:"So deeply embedded is the principle of equality before the law that any deviation from it undermines public confidence in the justice system.",z:"法律面前人人平等的原则如此根深蒂固，以至于任何偏离都会破坏公众对司法体系的信心。",d:3,level:4},
{t:"The enforcement of anti-corruption legislation is essential for the proper functioning of democratic institutions.",z:"反腐法律的执行对于民主制度的正常运作至关重要。",d:3,level:4},
{t:"The evolving jurisprudence on digital privacy has struggled to keep pace with technological innovation.",z:"关于数字隐私的不断发展的法学理论一直在努力跟上技术创新的步伐。",d:3,level:4},
{t:"It is the obligation of the state to protect its citizens from unlawful interference with their fundamental rights.",z:"国家有义务保护其公民免受对其基本权利的非法干预。",d:3,level:4},
{t:"Not until the principle of universal jurisdiction was firmly established could crimes against humanity be prosecuted across borders.",z:"直到普遍管辖权原则被牢固确立，反人类罪才能跨国起诉。",d:3,level:4},
{t:"The principle of legal certainty requires that laws be clear, predictable, and accessible to all citizens.",z:"法律确定性原则要求法律清晰、可预测且所有公民都能获取。",d:3,level:4},
{t:"The growing emphasis on environmental law reflects a societal recognition that ecological harm constitutes a form of legal injury.",z:"对环境法日益增长的重视反映了一种社会认知，即生态损害构成一种法律伤害。",d:3,level:4},
{t:"Were whistleblower protections more robust, corporate malfeasance would be brought to light far more frequently.",z:"如果举报人保护更加健全，企业不法行为将会更频繁地被曝光。",d:3,level:4},
{t:"The doctrine of stare decisis ensures that legal precedent provides stability and predictability in judicial outcomes.",z:"遵循先例原则确保法律先例为司法结果提供稳定性和可预测性。",d:3,level:4},
{t:"The fundamental right to legal representation is essential for ensuring that justice is administered fairly.",z:"获得法律代理的基本权利对于确保公正执法至关重要。",d:3,level:4},
{t:"The challenge of balancing national security concerns with civil liberties has intensified in the post-9/11 era.",z:"在后9/11时代，平衡国家安全关切与公民自由的挑战加剧了。",d:3,level:4},
{t:"The development of transnational legal frameworks has become imperative in an increasingly globalized world.",z:"在日益全球化的世界中，跨国法律框架的发展已变得势在必行。",d:3,level:4},
{t:"It is through the independent functioning of the judiciary that the rule of law is most effectively preserved.",z:"正是通过司法部门的独立运作，法治才得到最有效的维护。",d:3,level:4},
{t:"The principle of proportionality in sentencing aims to ensure that the punishment is commensurate with the offense.",z:"量刑中的比例原则旨在确保刑罚与犯罪行为相称。",d:3,level:4},
{t:"The expansion of digital evidence in criminal proceedings has necessitated a rethinking of traditional rules of evidence.",z:"刑事诉讼中数字证据的扩展促使人们重新思考传统的证据规则。",d:3,level:4},
{t:"Not only does international law prohibit wars of aggression, but it also imposes individual criminal responsibility.",z:"国际法不仅禁止侵略战争，还规定了个人刑事责任。",d:3,level:4},
{t:"The recognition of indigenous land rights represents a significant milestone in the advancement of human rights law.",z:"承认原住民土地权代表了人权法进步的重要里程碑。",d:3,level:4},
{t:"So critical is access to legal aid that its absence can effectively deny individuals their right to justice.",z:"获得法律援助如此关键，以至于其缺失实际上可以剥夺个人获得正义的权利。",d:3,level:4},
{t:"The principle of legal pluralism acknowledges that multiple legal systems can coexist within a single state.",z:"法律多元主义原则承认多个法律体系可以在一个国家内共存。",d:3,level:4},
{t:"The prosecution of war crimes at the International Criminal Court has set important precedents for global accountability.",z:"国际刑事法院对战争罪的起诉为全球问责制树立了重要先例。",d:3,level:4},
{t:"Were privacy regulations more stringent, the exploitation of personal data by corporations would be significantly curtailed.",z:"如果隐私法规更加严格，企业对个人数据的利用将会大大减少。",d:3,level:4},
{t:"The adversarial system of justice has been criticized for prioritizing procedural victory over substantive truth.",z:"对抗制司法因其将程序性胜利置于实质真相之上而受到批评。",d:3,level:4},
{t:"The concept of legal personhood has evolved considerably to encompass not only individuals but also corporate entities.",z:"法律人格的概念已经发生了相当大的演变，不仅包括个人，还包括企业实体。",d:3,level:4},
{t:"The challenge of harmonizing international trade law with domestic labor standards remains largely unresolved.",z:"协调国际贸易法与国内劳工标准的挑战在很大程度上仍未解决。",d:3,level:4},
{t:"The enforcement of anti-monopoly legislation is crucial for maintaining competitive market dynamics.",z:"反垄断法的执行对于维护竞争性市场动态至关重要。",d:3,level:4},

// ============ Lv.4 中高级 Psychology ============
{t:"It is the interplay between cognitive processes and emotional responses that shapes human behavior.",z:"正是认知过程与情绪反应之间的相互作用塑造了人类行为。",d:3,level:4},
{t:"The extent to which early childhood experiences influence adult personality remains a subject of intense research.",z:"童年早期经历在多大程度上影响成年后的人格仍然是一个深入研究的课题。",d:3,level:4},
{t:"The phenomenon of cognitive dissonance illustrates how people reconcile conflicting beliefs and behaviors.",z:"认知失调现象阐释了人们如何调和相互矛盾的信念和行为。",d:3,level:4},
{t:"So powerful is the placebo effect that it can produce measurable physiological changes in patients.",z:"安慰剂效应如此强大，以至于它能在患者身上产生可测量的生理变化。",d:3,level:4},
{t:"Theories of attachment suggest that the quality of early caregiving has lasting effects on emotional regulation.",z:"依恋理论表明，早期照护质量对情绪调节有持久的影响。",d:3,level:4},
{t:"Not only does chronic stress impair immune function, but it also accelerates cognitive decline.",z:"慢性压力不仅会损害免疫功能，还会加速认知衰退。",d:3,level:4},
{t:"The social brain hypothesis proposes that the evolution of human intelligence was driven primarily by the demands of social living.",z:"社会大脑假说认为，人类智能的进化主要是由社会生活的需求驱动的。",d:3,level:4},
{t:"The capacity for empathy is now understood to be a complex neurocognitive process rather than a simple emotional response.",z:"共情能力现在被理解为一个复杂的神经认知过程，而非简单的情绪反应。",d:3,level:4},
{t:"The field of positive psychology has shifted the focus from pathology to the study of human flourishing.",z:"积极心理学领域已将焦点从病理学转向了对人类幸福的研究。",d:3,level:4},
{t:"It is well established that early intervention is critical for mitigating the effects of adverse childhood experiences.",z:"早期干预对于减轻不良童年经历的影响至关重要，这一点已得到充分证实。",d:3,level:4},
{t:"The bystander effect demonstrates how the presence of others can inhibit individual helping behavior.",z:"旁观者效应展示了他人的存在如何抑制个人的助人行为。",d:3,level:4},
{t:"Were cognitive behavioral therapy more widely accessible, millions suffering from anxiety could be effectively treated.",z:"如果认知行为疗法更加普及，数百万焦虑症患者就能得到有效治疗。",d:3,level:4},
{t:"The concept of emotional intelligence has gained widespread recognition as a key predictor of personal and professional success.",z:"情商的概念已获得广泛认可，被视为个人和职业成功的关键预测指标。",d:3,level:4},
{t:"The neurological basis of decision-making reveals that rational and emotional processes are far more intertwined than previously thought.",z:"决策的神经学基础表明，理性过程与情感过程的交织程度远超之前的认知。",d:3,level:4},
{t:"Not until the role of unconscious processing in perception was acknowledged did cognitive psychology undergo a paradigm shift.",z:"直到潜意识处理在感知中的作用得到承认，认知心理学才经历了范式转变。",d:3,level:4},
{t:"The phenomenon of selective attention illustrates how the brain filters the vast array of sensory information it receives.",z:"选择性注意现象阐释了大脑如何过滤它接收到的大量感官信息。",d:3,level:4},
